<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Personalización — Print & Copy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; min-height: 100vh; }
  .header { background: #1a1a1a; padding: 12px 20px; display: flex; align-items: center; gap: 10px; }
  .header img { height: 36px; width: auto; }
  .header h1 { color: #fff; font-size: 15px; font-weight: 700; }
  .container { max-width: 600px; margin: 0 auto; padding: 16px; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; padding: 16px; margin-bottom: 14px; }
  .card h2 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .card .sub { font-size: 12px; color: #888; margin-bottom: 12px; }
  .loading { text-align: center; padding: 50px 20px; color: #aaa; }
  .error { text-align: center; padding: 30px 20px; color: #A32D2D; font-size: 14px; }

  .fila-card { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; padding: 14px; margin-bottom: 10px; }
  .fila-num { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: #E6F1FB; color: #185FA5; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .fila-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .fila-header span { font-size: 13px; font-weight: 600; color: #444; }

  .field-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .field { flex: 1; }
  .field label { display: block; font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
  .field select, .field input { width: 100%; padding: 8px; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; background: #fff; }
  .field select:focus, .field input:focus { outline: none; border-color: #185FA5; }

  .color-btn { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fff; width: 100%; font-size: 14px; }
  .color-dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(0,0,0,.15); flex-shrink: 0; }
  .color-name { flex: 1; }

  .color-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: flex-end; }
  .color-modal.open { display: flex; }
  .color-modal-body { background: #fff; border-radius: 16px 16px 0 0; padding: 20px; width: 100%; max-height: 70vh; overflow-y: auto; }
  .color-modal-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
  .color-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .color-opt { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border: 2px solid #e5e7eb; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; background: #fff; }
  .color-opt:hover { border-color: #185FA5; }

  .resumen { background: #E6F1FB; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: #185FA5; line-height: 1.7; }
  .total-uds { font-size: 20px; font-weight: 800; }

  .btn-enviar { width: 100%; padding: 16px; background: #3B6D11; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
  .btn-enviar:disabled { background: #aaa; cursor: not-allowed; }
  .btn-add { width: 100%; padding: 10px; border: 1.5px dashed #b5d4f4; border-radius: 8px; background: none; font-size: 13px; color: #185FA5; cursor: pointer; margin-bottom: 14px; }

  .ok-screen { text-align: center; padding: 40px 20px; }
  .ok-ico { font-size: 60px; margin-bottom: 14px; }
  .ok-title { font-size: 22px; font-weight: 800; color: #3B6D11; margin-bottom: 8px; }
  .ok-sub { font-size: 14px; color: #555; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <img src="/logo.png" alt="Print & Copy" onerror="this.style.display='none'">
  <h1>Personalización</h1>
</div>

<div class="container">
  <div id="main-content">
    <div class="loading">⏳ Cargando...</div>
  </div>
</div>

<div class="color-modal" id="color-modal">
  <div class="color-modal-body">
    <div class="color-modal-title">Selecciona un color</div>
    <div class="color-grid" id="color-grid"></div>
  </div>
</div>

<script>
var SUPA_URL = 'https://ffiyprmbrznofoprvvik.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmaXlwcm1icnpub2ZvcHJ2dmlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjU2OTYsImV4cCI6MjA5MDc0MTY5Nn0.DesBbR1Az0i-nokR8d7TiJS6zQu3dF-cBfVPlJpcoRg';
var TALLAS = ['XS','S','M','L','XL','XXL','3XL'];
var PRENDAS = ['Camisetas','Sudaderas','Sudaderas c/capucha','Polos','Petos'];
var COLORES = [
  {nombre:'Blanco',hex:'#FFFFFF',borde:true},{nombre:'Negro',hex:'#1a1a1a'},
  {nombre:'Azul marino',hex:'#1B2A6B'},{nombre:'Azul royal',hex:'#2651A0'},
  {nombre:'Azul celeste',hex:'#6AAED6'},{nombre:'Azul denim',hex:'#4A6FA5'},
  {nombre:'Azul profundo',hex:'#1E3A5F'},{nombre:'Azul turquesa',hex:'#00A6A6'},
  {nombre:'Rojo',hex:'#CC2222'},{nombre:'Granate',hex:'#7B1F2E'},
  {nombre:'Naranja',hex:'#E87020'},{nombre:'Amarillo',hex:'#F5C518'},
  {nombre:'Verde grass',hex:'#3A7A3A'},{nombre:'Verde oasis',hex:'#5BAD6F'},
  {nombre:'Verde pradera',hex:'#7FBF50'},{nombre:'Rosa pálido',hex:'#F5B8C4'},
  {nombre:'Rosetón',hex:'#E8608A'},{nombre:'Púrpura',hex:'#7B2D8B'},
  {nombre:'Gris vigoré',hex:'#9C9C9C'},{nombre:'Marrón',hex:'#7B4F2E'},
  {nombre:'Lila',hex:'#B09CC8'}
];

var pedidoId = new URLSearchParams(window.location.search).get('p');
var _pedido = null;
var _filas = [];
var _colorModalIdx = null;

function api(path) {
  return fetch(SUPA_URL+'/rest/v1/'+path, {
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'}
  }).then(function(r){return r.json();});
}
function apiPatch(path, data) {
  return fetch(SUPA_URL+'/rest/v1/'+path, {
    method:'PATCH',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(data)
  });
}

function init() {
  if(!pedidoId){show('<div class="error">Enlace inválido.</div>');return;}
  api('pedidos?id=eq.'+pedidoId+'&select=id,cliente_nombre,descripcion,tallas_colores').then(function(r){
    if(!r||!r.length){show('<div class="error">Pedido no encontrado.</div>');return;}
    _pedido = r[0];
    if(_pedido.tallas_colores && _pedido.tallas_colores.length) {
      _filas = JSON.parse(JSON.stringify(_pedido.tallas_colores));
    } else {
      _filas = [{prenda:'Camisetas',color:'Negro',hex:'#1a1a1a',talla:'M',nombre:'',numero:''}];
    }
    render();
  }).catch(function(){show('<div class="error">Error de conexión.</div>');});
}

function render() {
  var ped = _pedido;
  var html = '';

  html += '<div class="card">'
    +'<h2>👋 Hola, '+(ped.cliente_nombre||'').split(' ')[0]+'</h2>'
    +'<div class="sub">Pedido <strong>'+pedidoId+'</strong> · '+ped.descripcion+'</div>'
    +'<p style="font-size:13px;color:#555;line-height:1.5">Rellena los datos de cada persona: prenda, color, talla, nombre para estampar y número.</p>'
    +'</div>';

  html += '<div id="filas-container">';
  _filas.forEach(function(f,i){
    html += renderFila(f,i);
  });
  html += '</div>';

  html += '<button class="btn-add" onclick="addFila()">+ Añadir otra persona</button>';
  html += '<div class="resumen" id="resumen">'+calcResumen()+'</div>';
  html += '<button class="btn-enviar" id="btn-enviar" onclick="enviar()">✅ Confirmar y enviar</button>';
  html += '<p style="text-align:center;font-size:11px;color:#aaa;margin-top:12px;padding-bottom:20px">Print & Copy · Av. Portugal 62, Salamanca · 923 018 034</p>';

  show(html);
  renderColorGrid();
}

function renderFila(f, i) {
  var borde = (f.borde||f.hex==='#FFFFFF') ? 'border:1px solid #ccc;' : '';
  var prendaOpts = PRENDAS.map(function(pr){
    return '<option value="'+pr+'"'+(f.prenda===pr?' selected':'')+'>'+pr+'</option>';
  }).join('');
  var tallaOpts = TALLAS.map(function(t){
    return '<option value="'+t+'"'+(f.talla===t?' selected':'')+'>'+t+'</option>';
  }).join('');

  return '<div class="fila-card" id="fila-'+i+'">'
    +'<div class="fila-header"><div class="fila-num">'+(i+1)+'</div><span>Persona '+(i+1)+'</span>'
    +(i>0?'<button onclick="delFila('+i+')" style="margin-left:auto;background:none;border:none;color:#ccc;font-size:18px;cursor:pointer">✕</button>':'')
    +'</div>'
    +'<div class="field-row">'
    +'<div class="field"><label>Prenda</label><select onchange="onFieldChange('+i+',\'prenda\',this.value)">'+prendaOpts+'</select></div>'
    +'<div class="field"><label>Talla</label><select onchange="onFieldChange('+i+',\'talla\',this.value)">'+tallaOpts+'</select></div>'
    +'</div>'
    +'<div class="field-row">'
    +'<div class="field"><label>Color</label>'
    +'<div class="color-btn" onclick="abrirColorModal('+i+')"><span class="color-dot" id="dot-'+i+'" style="background:'+(f.hex||'#1a1a1a')+';'+borde+'"></span><span class="color-name" id="clbl-'+i+'">'+(f.color||'Negro')+'</span><span style="font-size:11px;color:#aaa">▼</span></div>'
    +'</div>'
    +'</div>'
    +'<div class="field-row">'
    +'<div class="field" style="flex:2"><label>Nombre estampado</label><input type="text" value="'+(f.nombre||'')+'" placeholder="Ej: Carlos García" oninput="onFieldChange('+i+',\'nombre\',this.value)"></div>'
    +'<div class="field" style="flex:0 0 70px"><label>Número</label><input type="text" value="'+(f.numero||'')+'" placeholder="Ej: 7" style="text-align:center" oninput="onFieldChange('+i+',\'numero\',this.value)"></div>'
    +'</div>'
    +'</div>';
}

function onFieldChange(idx, field, val) {
  if(!_filas[idx]) return;
  _filas[idx][field] = val;
  var res = document.getElementById('resumen');
  if(res) res.innerHTML = calcResumen();
}

function calcResumen() {
  var rellenas = _filas.filter(function(f){return f.nombre && f.nombre.trim();}).length;
  var total = _filas.length;
  if(!rellenas) return '<span class="total-uds">0</span> de '+total+' personas rellenas';
  var lineas = _filas.filter(function(f){return f.nombre && f.nombre.trim();}).map(function(f){
    return '<strong>'+(f.nombre||'')+'</strong> · '+(f.prenda||'Camiseta')+' '+(f.color||'')+' '+(f.talla||'')+' '+(f.numero?'#'+f.numero:'');
  });
  return '<span class="total-uds">'+rellenas+'/'+total+'</span> personas<br>'+lineas.join('<br>');
}

function addFila() {
  _filas.push({prenda:'Camisetas',color:'Negro',hex:'#1a1a1a',talla:'M',nombre:'',numero:''});
  var container = document.getElementById('filas-container');
  if(container) container.insertAdjacentHTML('beforeend', renderFila(_filas[_filas.length-1], _filas.length-1));
  var res = document.getElementById('resumen');
  if(res) res.innerHTML = calcResumen();
}

function delFila(idx) {
  if(_filas.length <= 1) return;
  _filas.splice(idx, 1);
  render();
}

function abrirColorModal(idx) {
  _colorModalIdx = idx;
  document.getElementById('color-modal').classList.add('open');
}

function renderColorGrid() {
  var grid = document.getElementById('color-grid');
  if(!grid) return;
  grid.innerHTML = COLORES.map(function(c,i) {
    var borde = c.borde ? 'border:1px solid #ccc;' : '';
    return '<div class="color-opt" onclick="selColor('+i+')"><span style="width:16px;height:16px;border-radius:50%;background:'+c.hex+';'+borde+'display:inline-block;flex-shrink:0"></span>'+c.nombre+'</div>';
  }).join('');
}

function selColor(colorIdx) {
  var c = COLORES[colorIdx];
  var idx = _colorModalIdx;
  if(idx !== null && _filas[idx]) {
    _filas[idx].color = c.nombre;
    _filas[idx].hex = c.hex;
    _filas[idx].borde = c.borde||false;
    var dot = document.getElementById('dot-'+idx);
    var lbl = document.getElementById('clbl-'+idx);
    if(dot) dot.style.cssText = 'background:'+c.hex+';'+(c.borde?'border:1px solid #ccc;':'')+'width:16px;height:16px;border-radius:50%;border:1px solid rgba(0,0,0,.15);flex-shrink:0';
    if(lbl) lbl.textContent = c.nombre;
  }
  document.getElementById('color-modal').classList.remove('open');
}

document.getElementById('color-modal').addEventListener('click', function(e){
  if(e.target === this) this.classList.remove('open');
});

function enviar() {
  var rellenas = _filas.filter(function(f){return f.nombre && f.nombre.trim();}).length;
  if(rellenas === 0) {alert('Rellena al menos una persona');return;}
  var btn = document.getElementById('btn-enviar');
  if(btn){btn.disabled=true;btn.textContent='Enviando...';}
  apiPatch('pedidos?id=eq.'+pedidoId, {tallas_colores: _filas}).then(function(r){
    if(r.ok){
      show('<div class="card ok-screen">'
        +'<div class="ok-ico">✅</div>'
        +'<div class="ok-title">¡Recibido!</div>'
        +'<div class="ok-sub">Hemos recibido los datos de <strong>'+rellenas+' personas</strong> para el pedido <strong>'+pedidoId+'</strong>.<br><br>Nos ponemos en marcha. Te avisaremos cuando esté listo.<br><br><span style="color:#aaa">Print & Copy · 923 018 034</span></div>'
        +'</div>');
      setTimeout(function(){try{window.close();}catch(e){}},3000);
    } else {
      if(btn){btn.disabled=false;btn.textContent='✅ Confirmar y enviar';}
      alert('Error al enviar. Llámanos al 923 018 034');
    }
  }).catch(function(){
    if(btn){btn.disabled=false;btn.textContent='✅ Confirmar y enviar';}
    alert('Error al enviar. Llámanos al 923 018 034');
  });
}

function show(html){ document.getElementById('main-content').innerHTML = html; }

init();
</script>
</body>
</html>
