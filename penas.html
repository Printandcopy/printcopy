<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; min-height: 100vh; }
  .header { background: #1a1a1a; padding: 12px 20px; display: flex; align-items: center; gap: 10px; }
  .header img { height: 36px; width: auto; }
  .header h1 { color: #fff; font-size: 15px; font-weight: 700; }
  .container { max-width: 600px; margin: 0 auto; padding: 16px; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; padding: 16px; margin-bottom: 14px; }
  .card h2 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .card .sub { font-size: 12px; color: #888; margin-bottom: 12px; }
  .loading { text-align: center; padding: 50px 20px; color: #aaa; }
  .error { text-align: center; padding: 30px 20px; color: #A32D2D; font-size: 14px; }

  .fila-card { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; padding: 14px; margin-bottom: 10px; }
  .fila-num { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: #E6F1FB; color: #185FA5; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .fila-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .fila-header span { font-size: 13px; font-weight: 600; color: #444; }

  .field-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .field { flex: 1; }
  .field label { display: block; font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
  .field select, .field input { width: 100%; padding: 8px; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; background: #fff; }
  .field select:focus, .field input:focus { outline: none; border-color: #185FA5; }

  .color-btn { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fff; width: 100%; font-size: 14px; }
  .color-dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(0,0,0,.15); flex-shrink: 0; }
  .color-name { flex: 1; }

  .color-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: flex-end; }
  .color-modal.open { display: flex; }
  .color-modal-body { background: #fff; border-radius: 16px 16px 0 0; padding: 20px; width: 100%; max-height: 70vh; overflow-y: auto; }
  .color-modal-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
  .color-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .color-opt { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border: 2px solid #e5e7eb; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; background: #fff; }
  .color-opt:hover { border-color: #185FA5; }
  .kids-badge-sm{display:inline-block;background:#1D9E75;color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;letter-spacing:.3px;line-height:1.3}
  .kids-error{background:#FCEBEB;color:#501313;border:1px solid #E24B4A;border-radius:6px;padding:10px 12px;font-size:12.5px;margin:8px 0;font-weight:500}
  .kids-info-banner{display:flex;gap:10px;align-items:flex-start;background:#EAF3DE;color:#173404;border:0.5px solid #97C459;border-radius:8px;padding:10px 12px;margin-bottom:12px}
  .kids-dot-inline{display:inline-block;background:#1D9E75;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.3px;flex-shrink:0;margin-top:1px}

  .resumen { background: #E6F1FB; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: #185FA5; line-height: 1.7; }
  .total-uds { font-size: 20px; font-weight: 800; }

  .btn-enviar { width: 100%; padding: 16px; background: #3B6D11; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
  .btn-enviar:disabled { background: #aaa; cursor: not-allowed; }
  .btn-add { width: 100%; padding: 10px; border: 1.5px dashed #b5d4f4; border-radius: 8px; background: none; font-size: 13px; color: #185FA5; cursor: pointer; margin-bottom: 14px; }

  .ok-screen { text-align: center; padding: 40px 20px; }
  .ok-ico { font-size: 60px; margin-bottom: 14px; }
  .ok-title { font-size: 22px; font-weight: 800; color: #3B6D11; margin-bottom: 8px; }
  .ok-sub { font-size: 14px; color: #555; line-height: 1.6; }
</style>

var pedidoId = new URLSearchParams(window.location.search).get('p');
var _pedido = null;
var _filas = [];
var _cantPedido = 0;
var _colorModalIdx = null;

function api(path) {
  return fetch(SUPA_URL+'/rest/v1/'+path, {
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'}
  }).then(function(r){return r.json();});
}
function apiPatch(path, data) {
  return fetch(SUPA_URL+'/rest/v1/'+path, {
    method:'PATCH',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(data)
  });
}

function init() {
  if(!pedidoId){show('<div class="error">Enlace inválido.</div>');return;}
  if(new URLSearchParams(window.location.search).get('enviado')==='1'){
    show('<div class="card ok-screen"><div class="ok-ico">✅</div><div class="ok-title">Ya enviado</div><div class="ok-sub">Los datos de este pedido ya fueron enviados.<br><br>Ya puedes cerrar esta página.<br><br><span style="color:#aaa">Print & Copy · 923 018 034</span></div></div>');
    return;
  }
  api('pedidos?id=eq.'+pedidoId+'&select=id,cliente_nombre,descripcion,tallas_colores').then(function(r){
    if(!r||!r.length){show('<div class="error">Pedido no encontrado.</div>');return;}
    _pedido = r[0];
    // Detectar prenda del pedido desde la descripción
    // Normalizamos sin acentos para evitar bugs de NFC/NFD
    var _descRaw = (_pedido.descripcion||'');
    var _desc = _descRaw.toUpperCase();
    var _descSA = _desc.normalize('NFD').replace(/[\u0300-\u036f]/g,''); // sin acentos
    var _prendaDetectada = 'Camiseta Beagle 6554';

    // PRIORIDAD 1 — Keywords más específicos (van primero para no colisionar)
    if(_descSA.indexOf('NEBRASKA')>=0) _prendaDetectada='Softshell Nebraska 6436';
    else if(_descSA.indexOf('ANTARTIDA')>=0) _prendaDetectada='Softshell Antártida 6432';
    else if(_descSA.indexOf('ARTIC')>=0) _prendaDetectada='Polar New Artic 6414';
    else if(_descSA.indexOf('JAMAICA')>=0) _prendaDetectada='Camiseta Jamaica 6627';
    else if(_descSA.indexOf('BAHRAIN')>=0) _prendaDetectada='Camiseta Bahrain 0407';
    else if(_descSA.indexOf('VACCINE')>=0) _prendaDetectada='Bata Vaccine 9094';
    else if(_descSA.indexOf('VADEMECUM')>=0) _prendaDetectada='Pantalón Vademécum 9097';
    else if(_descSA.indexOf('ARZAK')>=0) _prendaDetectada='Casulla Arzak 9091';
    else if(_descSA.indexOf('PANACEA')>=0) _prendaDetectada='Casaca Panacea 9098';
    else if(_descSA.indexOf('AIFOS L/S')>=0||_descSA.indexOf('AIFOS LS')>=0||_descSA.indexOf('AIFOS 5504')>=0) _prendaDetectada='Camisa Aifos L/S 5504';
    else if(_descSA.indexOf('AIFOS')>=0) _prendaDetectada='Camisa Aifos 5503';
    else if(_descSA.indexOf('BENOIT')>=0) _prendaDetectada='Delantal Benoit 9125';
    else if(_descSA.indexOf('CLASSIC')>=0&&_descSA.indexOf('DELANTAL')>=0) _prendaDetectada='Delantal Classic 9123';
    else if(_descSA.indexOf('DELANTAL MINI')>=0||(_descSA.indexOf('MINI')>=0&&_descSA.indexOf('DELANTAL')>=0)) _prendaDetectada='Delantal Mini 9124';
    else if(_descSA.indexOf('ERIS')>=0||_descSA.indexOf('GORRA')>=0) _prendaDetectada='Gorra Eris 7019';
    else if(_descSA.indexOf('FESTERO')>=0||_descSA.indexOf('PANUELO')>=0) _prendaDetectada='Pañuelo Festero 9003';
    else if(_descSA.indexOf('HAMELIN')>=0||_descSA.indexOf('MOCHILA')>=0) _prendaDetectada='Mochila Hamelin 7114';
    else if(_descSA.indexOf('BUZO')>=0||_descSA.indexOf('KEVIN')>=0) _prendaDetectada='Buzo Kevin';
    else if(_descSA.indexOf('TRAFFIC')>=0||_descSA.indexOf('PARKA')>=0) _prendaDetectada='Parka Traffic';
    else if(_descSA.indexOf('PANTALON THUNDER')>=0) _prendaDetectada='Pantalón Thunder';
    else if(_descSA.indexOf('CHALECO')>=0||_descSA.indexOf('THUNDER')>=0) _prendaDetectada='Chaleco Thunder';
    else if(_descSA.indexOf('HILL')>=0||_descSA.indexOf('TOTEBAG')>=0) _prendaDetectada='Totebag Hill 7601';
    else if(_descSA.indexOf('MONTBLANC')>=0) _prendaDetectada='Sudadera Montblanc 6421';
    else if(_descSA.indexOf('ULAN')>=0) _prendaDetectada='Sudadera Ulan 6439';
    else if(_descSA.indexOf('URBAN')>=0||(_descSA.indexOf('SUDADERA')>=0&&_descSA.indexOf('CAPUCHA')>=0)) _prendaDetectada='Sudadera Urban 1067';
    else if(_descSA.indexOf('CLASICA')>=0||_descSA.indexOf('SUDADERA')>=0) _prendaDetectada='Sudadera Clásica 1070';
    else if(_descSA.indexOf('STAR')>=0||_descSA.indexOf('POLO')>=0) _prendaDetectada='Polo Star 6638';
    else if(_descSA.indexOf('PREGON')>=0||_descSA.indexOf('PETO')>=0) _prendaDetectada='Peto Pregón 1500';
    else if(_descSA.indexOf('BEAGLE')>=0||_descSA.indexOf('CAMISETA')>=0) _prendaDetectada='Camiseta Beagle 6554';
    window._prendaPedido = _prendaDetectada;
    // Extraer cantidad del pedido de la descripción (ej: "×15")
    var _m=(_pedido.descripcion||'').match(/[×x](\d+)/i);
    _cantPedido=_m?parseInt(_m[1]):0;
    if(_pedido.tallas_colores && _pedido.tallas_colores.length) {
      _filas = JSON.parse(JSON.stringify(_pedido.tallas_colores));
      // Forzar la prenda detectada del pedido sobre los datos guardados
      _filas.forEach(function(f){f.prenda=_prendaDetectada;});
    } else {
      _filas = [{prenda:_prendaDetectada,color:'Negro',hex:'#1a1a1a',talla:'M',nombre:'',numero:''}];
    }
    render();
  }).catch(function(){show('<div class="error">Error de conexión.</div>');});
}

  var ped = _pedido;
  var html = '';

  html += '<div class="card">'
    +'<h2>👋 Hola, '+(ped.cliente_nombre||'').split(' ')[0]+'</h2>'

    html += renderFila(f,i);
  });

  // Banner informativo cuando el modelo tiene versión KIDS

    var _btxt = '<div class="kids-info-banner">'
      +'<span class="kids-dot-inline">KIDS</span>'
      +'<div style="font-size:12px;line-height:1.45"><strong>Este modelo está disponible también en tallas niño.</strong><br><span style="color:#2A5C1C">Al elegir un color marcado con el distintivo KIDS, en el desplegable de talla aparecerá el grupo <em>Niño</em>.</span></div>'

  html += '<button class="btn-enviar" id="btn-enviar" onclick="enviar()">✅ Confirmar y enviar</button>';
  html += '<p style="text-align:center;font-size:11px;color:#aaa;margin-top:12px;padding-bottom:20px">Print & Copy · Av. Portugal 62, Salamanca · 923 018 034</p>';

  show(html);
  renderColorGrid();
  actualizarGuiaTallas();
}

function renderFila(f, i) {
  var borde = (f.borde||f.hex==='#FFFFFF') ? 'border:1px solid #ccc;' : '';
  var prendaOpts = PRENDAS.map(function(pr){
    return '<option value="'+pr+'"'+(f.prenda===pr?' selected':'')+'>'+pr+'</option>';
  }).join('');
  var colores=PRENDA_COLORES[f.prenda]||COLORES;
  var cDef=colores.find(function(c){return c.nombre===(f.color||'Negro');})||{cod:'02'};
  var esKidsColor=!!cDef.kids;
  var tallaOpts = buildTallaOpts(f.prenda||'Camiseta Beagle 6554', esKidsColor, f.talla);
  var imgUrl=rolyImgUrl(f.prenda||'Camiseta Beagle 6554',cDef.cod);
  var kidsBadge=esKidsColor?'<span class="kids-badge-sm" style="margin-left:5px">KIDS</span>':'';

  return '<div class="fila-card" id="fila-'+i+'">'
    +'<div class="fila-header"><div class="fila-num">'+(i+1)+'</div><span>Persona '+(i+1)+'</span>'
    +(i>0?'<button onclick="delFila('+i+')" style="margin-left:auto;background:none;border:none;color:#ccc;font-size:18px;cursor:pointer">✕</button>':'')
    +'</div>'
    +'<div class="field-row">'
    +'<div class="field"><label>Prenda</label><select disabled onchange="onFieldChange('+i+',\'prenda\',this.value)" style="opacity:.7">'+prendaOpts+'</select></div>'
    +'<div class="field"><label>Talla</label><select id="talla-sel-'+i+'" onchange="onFieldChange('+i+',\'talla\',this.value)">'+tallaOpts+'</select></div>'
    +'</div>'
    +'<div class="field-row">'
    +'<div class="field" style="flex:1"><label>Color</label>'
    +'<div class="color-btn" onclick="abrirColorModal('+i+')"><span class="color-dot" id="dot-'+i+'" style="background:'+(f.hex||'#1a1a1a')+';'+borde+'"></span><span class="color-name" id="clbl-'+i+'">'+(f.color||'Negro')+'</span><span id="kids-'+i+'">'+kidsBadge+'</span><span style="font-size:11px;color:#aaa;margin-left:auto">▼</span></div>'
    +'</div>'
    +'</div>'
    +'<div class="field-row">'
    +'<div class="field" style="flex:2"><label>Nombre estampado</label><input type="text" value="'+(f.nombre||'')+'" placeholder="Ej: Carlos García" oninput="onFieldChange('+i+',\'nombre\',this.value)"></div>'
    +'<div class="field" style="flex:0 0 70px"><label>Número</label><input type="text" value="'+(f.numero||'')+'" placeholder="Ej: 7" style="text-align:center" oninput="onFieldChange('+i+',\'numero\',this.value)"></div>'
    +'</div>'
    +'</div>';
}

function onFieldChange(idx, field, val) {
  if(!_filas[idx]) return;
  _filas[idx][field] = val;
  if(field==='prenda'){actualizarGuiaTallas();actualizarFotoPrencia(idx);}
  if(field==='color')actualizarFotoPrencia(idx);
  var res = document.getElementById('resumen');
  if(res) res.innerHTML = calcResumen();
}

function calcResumen() {
  var rellenas = _filas.filter(function(f){return f.nombre && f.nombre.trim();}).length;
  var totalRef = _cantPedido>0?_cantPedido:_filas.length;
  var faltan = totalRef - rellenas;
  var color = rellenas===0?'#A32D2D':rellenas<totalRef?'#BA7517':'#3B6D11';
  var estado = rellenas===0?'Sin rellenar':rellenas<totalRef?'Faltan '+faltan:'Completo';
  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
    +'<span class="total-uds" style="color:'+color+'">'+rellenas+'/'+totalRef+'</span>'
    +'<span style="font-size:12px;font-weight:600;color:'+color+'">'+estado+'</span></div>';
  if(!rellenas) return html;
  var lineas = _filas.filter(function(f){return f.nombre && f.nombre.trim();}).map(function(f){
    return '<strong>'+(f.nombre||'')+'</strong> · '+(f.prenda||'Camiseta')+' '+(f.color||'')+' '+(f.talla||'')+' '+(f.numero?'#'+f.numero:'');
  });
  return html+lineas.join('<br>');
}

function addFila() {
  if(_cantPedido>0 && _filas.length>=_cantPedido){
    alert('El pedido es de '+_cantPedido+' unidades. No puedes añadir más personas.');
    return;
  }
  _filas.push({prenda:window._prendaPedido||'Camiseta Beagle 6554',color:'Negro',hex:'#1a1a1a',talla:'M',nombre:'',numero:''});
  var container = document.getElementById('filas-container');
  if(container) container.insertAdjacentHTML('beforeend', renderFila(_filas[_filas.length-1], _filas.length-1));
  var res = document.getElementById('resumen');
  if(res) res.innerHTML = calcResumen();
}

function delFila(idx) {
  if(_filas.length <= 1) return;
  _filas.splice(idx, 1);
  render();
}

function abrirColorModal(idx) {
  _colorModalIdx = idx;
  var prenda=(_filas[idx]&&_filas[idx].prenda)||'Camiseta Beagle 6554';
  var colores=PRENDA_COLORES[prenda]||COLORES;
  var grid=document.getElementById('color-grid');
  if(grid){
    grid.innerHTML=colores.map(function(c,i){
      var borde=c.borde?'border:1px solid #ccc;':'';
      var kb=c.kids?'<span class="kids-badge-sm" style="margin-left:auto">KIDS</span>':'';
      return'<div class="color-opt" onclick="selColor('+i+')"><span style="width:16px;height:16px;border-radius:50%;background:'+c.hex+';'+borde+'display:inline-block;flex-shrink:0"></span>'+c.nombre+kb+'</div>';
    }).join('');
  }
  document.getElementById('color-modal').classList.add('open');
}

function renderColorGrid() {
  var grid = document.getElementById('color-grid');
  if(!grid) return;
  grid.innerHTML = COLORES.map(function(c,i) {
    var borde = c.borde ? 'border:1px solid #ccc;' : '';
    var bg = c.hex2 ? 'linear-gradient(135deg,'+c.hex+' 50%,'+c.hex2+' 50%)' : c.hex;
    return '<div class="color-opt" onclick="selColor('+i+')"><span style="width:16px;height:16px;border-radius:50%;background:'+bg+';'+borde+'display:inline-block;flex-shrink:0"></span>'+c.nombre+'</div>';
  }).join('');
}

function selColor(colorIdx) {
  var prenda=(_filas[_colorModalIdx]&&_filas[_colorModalIdx].prenda)||'Camiseta Beagle 6554';
  var colores=PRENDA_COLORES[prenda]||COLORES;
  var c = colores[colorIdx];
  var idx = _colorModalIdx;
  if(idx !== null && _filas[idx]) {
    _filas[idx].color = c.nombre;
    _filas[idx].hex = c.hex;
    _filas[idx].hex2 = c.hex2||null;
    _filas[idx].borde = c.borde||false;
    _filas[idx].kids = !!c.kids;
    var dot = document.getElementById('dot-'+idx);
    var lbl = document.getElementById('clbl-'+idx);
    var kb  = document.getElementById('kids-'+idx);
    var bg = c.hex2 ? 'background:linear-gradient(135deg,'+c.hex+' 50%,'+c.hex2+' 50%)' : 'background:'+c.hex;
    if(dot) dot.style.cssText = bg+';'+(c.borde?'border:1px solid #ccc;':'')+'width:16px;height:16px;border-radius:50%;border:1px solid rgba(0,0,0,.15);flex-shrink:0';
    if(lbl) lbl.textContent = c.nombre;
    if(kb)  kb.innerHTML = c.kids?'<span class="kids-badge-sm" style="margin-left:5px">KIDS</span>':'';
    // Refrescar desplegable de talla: si el nuevo color no es KIDS y la talla actual es niño, limpiarla
    var tallaSel=document.getElementById('talla-sel-'+idx);
    if(tallaSel && tieneKids(prenda)){
      var tActual=_filas[idx].talla||'';
      var esTallaNino=tActual && tActual.indexOf('N:')===0;
      // Si ahora no es kids, quitar grupo niño; si ya había talla niño, resetear
      if(!c.kids && esTallaNino){_filas[idx].talla='';}
      tallaSel.innerHTML=buildTallaOpts(prenda, !!c.kids, _filas[idx].talla||'');
    }
    actualizarFotoPrencia(idx);
  }
  document.getElementById('color-modal').classList.remove('open');
}

document.getElementById('color-modal').addEventListener('click', function(e){
  if(e.target === this) this.classList.remove('open');
});

function enviar() {
  var rellenas = _filas.filter(function(f){return f.nombre && f.nombre.trim();}).length;
  if(rellenas === 0) {alert('Rellena al menos una persona');return;}
  // Verificar que todas las filas tengan nombre (no dejar huecos)
  var vacias = _filas.filter(function(f){return !f.nombre || !f.nombre.trim();}).length;
  if(vacias > 0){
    alert('Hay '+vacias+' persona(s) sin nombre.\n\nRellena todas las filas o elimina las que sobren.');
    return;
  }
  // Validación KIDS: si hay talla niño pero el color no es KIDS, error
  var confl=_filas.filter(function(f){
    var t=f.talla||'';
    return t.indexOf('N:')===0 && !f.kids;
  });
  if(confl.length>0){
    var names=confl.map(function(f){return f.nombre||'(sin nombre)';}).join(', ');
    alert('⚠️ Conflicto KIDS\n\n'+confl.length+' persona(s) tienen talla de niño pero el color elegido no está disponible para niño:\n\n'+names+'\n\nElige un color marcado KIDS o cambia la talla a adulto.');
    return;
  }
  // Extraer cantidad del pedido de la descripción
  var match=(_pedido.descripcion||'').match(/[×x](\d+)/i);
  var cantPedido=match?parseInt(match[1]):0;
  if(cantPedido>0 && rellenas!==cantPedido){
    alert('Has rellenado '+rellenas+' personas pero el pedido es de '+cantPedido+'.\n\n'+(rellenas<cantPedido?'Faltan '+(cantPedido-rellenas)+' personas. Añade más filas.':'Sobran '+(rellenas-cantPedido)+'. Elimina las que no necesites.'));
    return;
  }
  var btn = document.getElementById('btn-enviar');
  if(btn){btn.disabled=true;btn.textContent='Enviando...';}
  apiPatch('pedidos?id=eq.'+pedidoId, {tallas_colores: _filas}).then(function(r){
    if(r.ok){
      document.title='✅ Datos enviados';
      show('<div class="card ok-screen">'
        +'<div class="ok-ico">✅</div>'
        +'<div class="ok-title">¡Recibido!</div>'
        +'<div class="ok-sub">Hemos recibido los datos de <strong>'+rellenas+' personas</strong> para el pedido <strong>'+pedidoId+'</strong>.<br><br>Nos ponemos en marcha. Te avisaremos cuando esté listo.<br><br>Ya puedes cerrar esta página.<br><br><span style="color:#aaa">Print & Copy · 923 018 034</span></div>'
        +'</div>');
      history.replaceState(null,'','?p='+pedidoId+'&enviado=1');
    } else {
      if(btn){btn.disabled=false;btn.textContent='✅ Confirmar y enviar';}
      alert('Error al enviar. Llámanos al 923 018 034');
    }
  }).catch(function(){
    if(btn){btn.disabled=false;btn.textContent='✅ Confirmar y enviar';}
    alert('Error al enviar. Llámanos al 923 018 034');
  });
}

      +'</div>'

  }
  // Sin ficha: asegurar que la card (guía clásica) exista; si fue sustituida antes por un <a>, restaurarla
  if(cardGuia.tagName==='A'){
    cardGuia.outerHTML='<div class="card" id="card-guia-tallas" style="padding:12px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="var g=document.getElementById(\'guia-tallas\');g.style.display=g.style.display===\'none\'?\'block\':\'none\'">'
      +'<span style="font-size:13px;font-weight:700;color:#185FA5">📏 Guía de tallas</span>'
      +'<span style="font-size:11px;color:#aaa">▼</span>'
      +'</div>'
      +'<div id="guia-tallas" style="margin-top:10px">'
      +'<div id="guia-tallas-contenido"></div>'
      +'</div></div>';

    +'<div style="width:1px;flex:1;background:#185FA5;position:relative">'
    +'<div style="position:absolute;top:-3px;left:-2.5px;width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-bottom:5px solid #185FA5"></div>'
    +'<div style="position:absolute;bottom:-3px;left:-2.5px;width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-top:5px solid #185FA5"></div>'
    +'</div></div>'

    +'</div>'
    +'</div>'

function actualizarFotoPrencia(idx){
  var f=_filas[idx];if(!f)return;
  var prenda=f.prenda||'Camiseta Beagle 6554';
  var color=f.color||'Negro';
  var colores=PRENDA_COLORES[prenda]||COLORES;
  var cDef=colores.find(function(c){return c.nombre===color;})||{cod:'02'};
  var url=rolyImgUrl(prenda,cDef.cod);
  var img=document.getElementById('prenda-img-'+idx);
  if(img){img.src=url;img.style.display='block';}
}
