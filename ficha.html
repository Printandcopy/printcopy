<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha de producción · Print & Copy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
body{font-family:Arial,sans-serif;padding:20px;font-size:14px;color:#1a1a1a;background:#f5f5f0}
.contenedor{max-width:780px;margin:0 auto;background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cargando{text-align:center;padding:60px 20px;color:#888}
.cargando .spin{display:inline-block;width:30px;height:30px;border:3px solid #eee;border-top-color:#185FA5;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:#FCEBEB;border:1.5px solid #F09595;border-radius:8px;padding:18px;color:#791F1F;text-align:center}
.top{text-align:center;border-bottom:2px solid #1a1a1a;padding-bottom:12px;margin-bottom:16px}
.top h1{font-size:32px;font-weight:700;margin:0}
.top .fecha{font-size:18px;margin-top:4px}
.top .fecha b{color:#1a1a1a}
.desc{font-size:14px;color:#555;margin-bottom:14px;text-align:center}
.acciones{display:flex;justify-content:center;gap:8px;margin-bottom:16px}
.btn{padding:10px 20px;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
.btn-print{background:#185FA5}
@media print{.acciones,.contenedor{box-shadow:none;background:transparent;padding:0;border:none}.contenedor{max-width:100%}body{padding:10px;background:#fff}}
table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:16px}
th{background:#1a1a1a;color:#fff;padding:8px 10px;text-align:center;font-weight:600;font-size:13px}
td{padding:7px 10px;border:0.5px solid #ddd;font-size:14px;text-align:center}
tr:nth-child(even){background:#f9f9f9}
.cdot{display:inline-block;width:14px;height:14px;border-radius:50%;border:1px solid #ccc;vertical-align:middle;margin-right:5px}
.previa{text-align:center;margin:16px 0}
.previa img{max-width:100%;max-height:400px;border-radius:6px}
.bloque{border:1.5px solid #ddd;border-radius:7px;padding:12px;margin-bottom:14px}
.bloque h3{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kv{display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid #eee;font-size:13px}
.kv:last-child{border-bottom:none}
.kv b{color:#1a1a1a}
.aviso{background:#FFF8EC;border:1.5px solid #FAC775;border-radius:6px;padding:10px 12px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.aviso b{color:#854F0B}
.notas{background:#fafaf7;border:0.5px solid #e0e0dc;border-radius:6px;padding:10px 12px;margin-top:14px;font-size:12px;color:#444;line-height:1.5}
.notas .lbl{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.estamp{margin-bottom:14px;border:1px solid #5B9F1F;border-radius:6px;padding:10px 12px;background:#FAFEF4}
.estamp h3{font-size:11px;font-weight:700;color:#3B6D11;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.estamp table{font-size:12px}
.estamp th{background:#EAF3DE;color:#3B6D11;padding:5px 8px;border:0.5px solid #c5d9aa}
.estamp td{padding:5px 8px;border:0.5px solid #e0e0dc;background:#fff}
.fecha-fija{color:#A32D2D!important}
.footer{margin-top:20px;border-top:1px solid #ddd;padding-top:6px;font-size:10px;color:#aaa;text-align:center}
</style>
</head>
<body>
<div class="contenedor" id="cont">
  <div class="cargando" id="loader">
    <div class="spin"></div>
    <div>Cargando ficha de producción...</div>
  </div>
</div>

<script>
var SUPA="https://ffiyprmbrznofoprvvik.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmaXlwcm1icnpub2ZvcHJ2dmlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjU2OTYsImV4cCI6MjA5MDc0MTY5Nn0.DesBbR1Az0i-nokR8d7TiJS6zQu3dF-cBfVPlJpcoRg";

// Etiquetas (copiadas del index.html)
var ZONA_LABEL={'delantera':'Delantera','trasera':'Trasera','manga-corta-izq':'Manga corta izq','manga-corta-dcha':'Manga corta dcha','manga-larga-izq':'Manga larga izq','manga-larga-dcha':'Manga larga dcha','capucha':'Capucha','otra':'Otra'};
var TAMANO_LABEL={'pequena':'Pequeña','mediana':'Mediana','grande':'Grande','completa':'Completa'};
var POSICION_LABEL={'centro':'Centro','izq':'Izquierda','dcha':'Derecha','arriba':'Arriba','abajo':'Abajo'};

function esPrendaCliente(p){
  if(!p)return false;
  if(p.tipo_prenda_cliente && (p.tipo_prenda_cliente+'').trim())return true;
  var d=(p.descripcion||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  return d.indexOf('PRENDA CLIENTE')>=0 || d.indexOf('PRENDA DEL CLIENTE')>=0;
}

function pictogramaSimple(zona){
  // Pictograma muy simple: rectángulo con marca de zona
  var marca='';
  if(zona==='delantera')marca='<rect x="22" y="14" width="16" height="14" fill="#1a1a1a" rx="2"/>';
  else if(zona==='trasera')marca='<rect x="22" y="14" width="16" height="14" fill="#666" rx="2"/>';
  else if(zona==='capucha')marca='<path d="M30 8 Q22 4 18 14" stroke="#1a1a1a" stroke-width="2" fill="none"/>';
  else if(zona&&zona.indexOf('manga')>=0)marca='<rect x="44" y="14" width="6" height="10" fill="#1a1a1a" rx="1"/>';
  return '<svg viewBox="0 0 60 70" width="50" height="58"><path d="M10 10 L20 5 L40 5 L50 10 L48 18 L42 16 L42 60 L18 60 L18 16 L12 18 Z" fill="#fff" stroke="#888" stroke-width="1"/>'+marca+'</svg>';
}

function fmtFecha(s){
  if(!s)return 'Sin fecha';
  var d=new Date(s+'T12:00:00');
  return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
}

function cargarPedido(){
  var p=new URLSearchParams(window.location.search).get('p');
  if(!p){
    document.getElementById('cont').innerHTML='<div class="error">⚠️ Falta el ID del pedido en la URL.<br><br>Formato correcto: <code>ficha.html?p=TX-0073</code></div>';
    return;
  }
  // Cargar pedido + cliente
  fetch(SUPA+'/rest/v1/pedidos?id=eq.'+encodeURIComponent(p)+'&select=*',{headers:{apikey:KEY}})
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data||!data.length){
        document.getElementById('cont').innerHTML='<div class="error">⚠️ Pedido no encontrado: '+p+'</div>';
        return;
      }
      renderFicha(data[0]);
    })
    .catch(function(e){
      document.getElementById('cont').innerHTML='<div class="error">⚠️ Error al cargar el pedido: '+e.message+'</div>';
    });
}

function renderFicha(p){
  var esTX=p.seccion==='TX';
  var esPrendaCli=esPrendaCliente(p);
  var qtyMatch=(p.descripcion||'').match(/×\s*(\d+)/);
  var qty=qtyMatch?qtyMatch[1]:'';
  var fechaTxt=fmtFecha(p.fecha_entrega);
  var esFija=p.fecha_tipo==='fija';

  var html='<div class="top"><h1>'+p.id+'</h1><div class="fecha'+(esFija?' fecha-fija':'')+'">Entrega'+(esFija?' FIJA':'')+': <b>'+fechaTxt+'</b></div></div>';
  html+='<div class="desc"><b>'+(p.cliente_nombre||'')+'</b> · '+(p.descripcion||'')+(qty?' · <b>'+qty+' uds</b>':'')+'</div>';
  html+='<div class="acciones"><button class="btn btn-print" onclick="window.print()">🖨️ Imprimir</button></div>';

  // Aviso prenda del cliente
  if(esPrendaCli && p.tipo_prenda_cliente){
    html+='<div class="aviso">📦 <div><b>PRENDA DEL CLIENTE:</b> '+p.tipo_prenda_cliente+'</div></div>';
  }

  // Tablas tallas (textil)
  if(esTX){
    if(p.tallas_colores && p.tallas_colores.length){
      if(p.tipo_personalizacion==='individual'){
        html+='<table><tr><th>#</th><th>Prenda</th><th>Color</th><th>Talla</th><th>Nombre</th><th>Nº</th></tr>';
        p.tallas_colores.forEach(function(f,i){
          if(!f.nombre)return;
          html+='<tr><td>'+(i+1)+'</td><td>'+(f.prenda||'Camiseta')+'</td><td><span class="cdot" style="background:'+(f.hex||'#888')+'"></span>'+(f.color||'')+'</td><td><b>'+(f.talla||'')+'</b></td><td style="font-size:15px"><b>'+(f.nombre||'')+'</b></td><td style="font-size:15px"><b>'+(f.numero||'')+'</b></td></tr>';
        });
        html+='</table>';
      }else{
        var tallas=['XS','S','M','L','XL','XXL','3XL'];
        html+='<table><tr><th>Color</th>'+tallas.map(function(t){return'<th>'+t+'</th>';}).join('')+'<th>Total</th></tr>';
        var granTotal=0;
        p.tallas_colores.forEach(function(f){
          var rowTotal=tallas.reduce(function(s,t){return s+(parseInt((f.tallas||{})[t])||0);},0);
          if(rowTotal===0)return;
          granTotal+=rowTotal;
          html+='<tr><td><span class="cdot" style="background:'+(f.hex||'#888')+'"></span>'+(f.color||'?')+'</td>'+tallas.map(function(t){var v=parseInt((f.tallas||{})[t])||0;return'<td>'+(v||'')+'</td>';}).join('')+'<td><b>'+rowTotal+'</b></td></tr>';
        });
        html+='<tr style="background:#eee;font-weight:700"><td>TOTAL</td>'+tallas.map(function(){return'<td></td>';}).join('')+'<td>'+granTotal+'</td></tr></table>';
      }
    }
  }

  // Estampaciones (textil)
  if(p.estampaciones && p.estampaciones.length){
    html+='<div class="estamp">';
    html+='<h3>🎨 Estampaciones / Bordados</h3>';
    html+='<table><tr><th>Vista</th><th>Zona</th><th>Tamaño</th><th>Posición</th><th>Qué va</th><th>Color tinta</th></tr>';
    p.estampaciones.forEach(function(e){
      var zonaLbl=e.zona==='otra'?(e.posicionLibre||'Otra'):(ZONA_LABEL[e.zona]||e.zona||'-');
      var tamLbl=TAMANO_LABEL[e.tamano]||e.tamano||'-';
      var posLbl=e.posicion?(POSICION_LABEL[e.posicion]||e.posicion):'-';
      html+='<tr>'
        +'<td>'+pictogramaSimple(e.zona)+'</td>'
        +'<td style="font-weight:600;text-align:left">'+zonaLbl+'</td>'
        +'<td>'+tamLbl+'</td>'
        +'<td>'+posLbl+'</td>'
        +'<td style="text-align:left">'+(e.descripcion||'<span style="color:#aaa">-</span>')+'</td>'
        +'<td style="text-align:left">'+(e.color||'<span style="color:#aaa">-</span>')+'</td>'
        +'</tr>';
    });
    html+='</table></div>';
  }

  // No textil: bloque datos producción
  if(!esTX){
    html+='<div class="bloque">';
    html+='<h3>📋 Datos para producción</h3>';
    html+='<div class="kv"><span>Producto</span><b>'+(p.descripcion||'-')+'</b></div>';
    if(qty)html+='<div class="kv"><span>Cantidad</span><b>'+qty+' unidades</b></div>';
    if(p.seccion)html+='<div class="kv"><span>Sección taller</span><b>'+p.seccion+'</b></div>';
    html+='</div>';
  }

  // Previa aprobada (cargar async)
  html+='<div class="previa" id="previa-section"><div style="font-size:11px;color:#888">Cargando previa...</div></div>';

  // Notas internas
  if(p.anotacion_operario && p.anotacion_operario.trim()){
    html+='<div class="notas"><span class="lbl">📝 Notas del operario</span>'+p.anotacion_operario.replace(/\n/g,'<br>')+'</div>';
  }

  html+='<div class="footer">Print & Copy · '+new Date().toLocaleDateString('es-ES')+' · '+p.id+'</div>';

  document.getElementById('cont').innerHTML=html;

  // Cargar previa asincrono
  fetch(SUPA+'/rest/v1/pedido_previas?pedido_id=eq.'+encodeURIComponent(p.id)+'&order=version.desc&limit=1&select=imagen_url,estado',{headers:{apikey:KEY}})
    .then(function(r){return r.json();})
    .then(function(d){
      var s=document.getElementById('previa-section');
      if(!s)return;
      if(d&&d.length&&d[0].imagen_url){
        s.innerHTML='<div style="font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;font-weight:700">'+(esTX?'Previa aprobada':'Arte aprobado')+'</div><img src="'+d[0].imagen_url+'">';
      }else{
        s.innerHTML='<div style="color:#aaa;font-size:12px;padding:14px;border:1px dashed #ddd;border-radius:6px">Sin previa aprobada</div>';
      }
    })
    .catch(function(){
      var s=document.getElementById('previa-section');
      if(s)s.innerHTML='<div style="color:#aaa;font-size:12px">Sin previa</div>';
    });
}

cargarPedido();
</script>
</body>
</html>
