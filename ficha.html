<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Ficha de producción · Print & Copy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
body{font-family:Arial,sans-serif;padding:14px;font-size:14px;color:#1a1a1a;background:#f5f5f0}
.contenedor{max-width:780px;margin:0 auto;background:#fff;padding:18px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cargando{text-align:center;padding:60px 20px;color:#888}
.cargando .spin{display:inline-block;width:30px;height:30px;border:3px solid #eee;border-top-color:#185FA5;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:#FCEBEB;border:1.5px solid #F09595;border-radius:8px;padding:18px;color:#791F1F;text-align:center}
.top{text-align:center;border-bottom:2px solid #1a1a1a;padding-bottom:10px;margin-bottom:14px}
.top h1{font-size:30px;font-weight:700;margin:0;letter-spacing:-1px}
.top .fecha{font-size:16px;margin-top:4px}
.top .fecha b{color:#1a1a1a}
.desc{font-size:14px;color:#444;margin-bottom:12px;text-align:center;line-height:1.4}
.desc b{color:#1a1a1a}
.acciones{display:flex;justify-content:center;gap:8px;margin-bottom:16px}
.btn{padding:10px 20px;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
.btn-print{background:#185FA5}
@media print{.acciones,.contenedor{box-shadow:none;background:transparent;padding:0;border:none}.contenedor{max-width:100%}body{padding:10px;background:#fff}}
.tabla-wrap{overflow-x:auto;margin-bottom:14px;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a1a1a;color:#fff;padding:7px 8px;text-align:center;font-weight:600;font-size:12px;white-space:nowrap}
td{padding:6px 8px;border:0.5px solid #ddd;font-size:13px;text-align:center}
tr:nth-child(even) td{background:#f9f9f9}
.cdot{display:inline-block;width:13px;height:13px;border-radius:50%;border:1px solid #ccc;vertical-align:middle;margin-right:4px}
.previa{text-align:center;margin:14px 0}
.previa img{max-width:100%;max-height:380px;border-radius:6px;border:0.5px solid #eee}
.bloque{border:1.5px solid #ddd;border-radius:7px;padding:12px;margin-bottom:14px}
.bloque h3{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kv{display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid #eee;font-size:13px;gap:8px}
.kv:last-child{border-bottom:none}
.kv b{color:#1a1a1a;text-align:right}
.aviso{background:#FFF8EC;border:1.5px solid #FAC775;border-radius:6px;padding:10px 12px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.aviso b{color:#854F0B}
.notas{background:#fafaf7;border:0.5px solid #e0e0dc;border-radius:6px;padding:10px 12px;margin-top:14px;font-size:13px;color:#444;line-height:1.5}
.notas .lbl{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.estamp-bloque{margin-bottom:14px;border:1px solid #5B9F1F;border-radius:6px;padding:10px 12px;background:#FAFEF4}
.estamp-bloque > h3{font-size:11px;font-weight:700;color:#3B6D11;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.estamp-card{display:flex;gap:12px;background:#fff;border:1px solid #c5d9aa;border-radius:6px;padding:10px;margin-bottom:8px;align-items:flex-start}
.estamp-card:last-child{margin-bottom:0}
.estamp-svg{flex-shrink:0;width:90px;height:90px;background:#fafaf7;border-radius:5px;border:0.5px solid #e0e0dc;display:flex;align-items:center;justify-content:center}
.estamp-info{flex:1;min-width:0;font-size:13px}
.estamp-zona{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
.estamp-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;margin-right:5px;margin-bottom:4px;vertical-align:middle}
.tag-dtf{background:#F3E8FE;color:#4A1A7A}
.tag-seri{background:#FFF8EC;color:#854F0B}
.tag-bord{background:#E8F4EA;color:#1B5E20}
.estamp-row{font-size:12px;color:#444;margin-top:3px}
.estamp-row b{color:#1a1a1a}
.fecha-fija{color:#A32D2D!important}
.footer{margin-top:18px;border-top:1px solid #ddd;padding-top:6px;font-size:10px;color:#aaa;text-align:center}
@media(max-width:600px){
  body{padding:8px}
  .contenedor{padding:14px;border-radius:6px}
  .top h1{font-size:24px}
  .top .fecha{font-size:14px}
  .desc{font-size:13px}
  table{font-size:12px}
  th{padding:5px 6px;font-size:11px}
  td{padding:5px 6px;font-size:12px}
  .estamp-svg{width:75px;height:75px}
  .estamp-zona{font-size:14px}
}
</style>
</head>
<body>
<div class="contenedor" id="cont">
  <div class="cargando" id="loader">
    <div class="spin"></div>
    <div>Cargando ficha de producción...</div>
  </div>
</div>

<script>
var SUPA="https://ffiyprmbrznofoprvvik.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmaXlwcm1icnpub2ZvcHJ2dmlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjU2OTYsImV4cCI6MjA5MDc0MTY5Nn0.DesBbR1Az0i-nokR8d7TiJS6zQu3dF-cBfVPlJpcoRg";

var ZONA_LABEL={'delantera':'Delantera','trasera':'Trasera','manga-corta-izq':'Manga corta izq','manga-corta-dcha':'Manga corta dcha','manga-larga-izq':'Manga larga izq','manga-larga-dcha':'Manga larga dcha','capucha':'Capucha','otra':'Otra'};
var TAMANO_LABEL={'pequena':'Pequeña','mediana':'Mediana','grande':'Grande','completa':'Completa'};
var POSICION_LABEL={'centro':'Centro','izq':'Izquierda','dcha':'Derecha','arriba':'Arriba','abajo':'Abajo'};
var TIPOCONT_LABEL={'logo':'Logo','nombre':'Nombre','numero':'Número','bandera':'Bandera','texto':'Texto','otro':'Otro'};

function esPrendaCliente(p){
  if(!p)return false;
  if(p.tipo_prenda_cliente && (p.tipo_prenda_cliente+'').trim())return true;
  var d=(p.descripcion||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  return d.indexOf('PRENDA CLIENTE')>=0 || d.indexOf('PRENDA DEL CLIENTE')>=0;
}

function pictogramaEstampacion(e, size){
  size=size||90;
  var gr='#E24B4A', grS='#A32D2D';
  var zona=e.zona||'delantera';
  var tam=e.tamano||'mediana';
  var pos=e.posicion||'centro';
  function siluetaCamiseta(){
    return '<path d="M28 22 L18 26 L18 38 L28 36 L28 88 L72 88 L72 36 L82 38 L82 26 L72 22 L62 18 Q50 26 38 18 Z" fill="#fafaf7" stroke="#888" stroke-width="1"/>';
  }
  function siluetaMangaCorta(ladoIzq){
    var d=ladoIzq
      ? 'M15 18 Q42 12 48 16 L48 52 Q42 56 15 50 L12 46 L14 22 Z'
      : 'M85 18 Q58 12 52 16 L52 52 Q58 56 85 50 L88 46 L86 22 Z';
    var pliegues=ladoIzq
      ? '<path d="M18 30 Q22 31 26 30" fill="none" stroke="#bbb" stroke-width="0.5"/><path d="M18 38 Q22 39 26 38" fill="none" stroke="#bbb" stroke-width="0.5"/>'
      : '<path d="M82 30 Q78 31 74 30" fill="none" stroke="#bbb" stroke-width="0.5"/><path d="M82 38 Q78 39 74 38" fill="none" stroke="#bbb" stroke-width="0.5"/>';
    return '<path d="'+d+'" fill="#fafaf7" stroke="#888" stroke-width="1"/>'+pliegues;
  }
  function siluetaMangaLarga(ladoIzq){
    var d=ladoIzq
      ? 'M15 18 Q42 12 48 16 L48 84 L42 88 L22 86 L12 82 L14 22 Z'
      : 'M85 18 Q58 12 52 16 L52 84 L58 88 L78 86 L88 82 L86 22 Z';
    var puno=ladoIzq
      ? '<path d="M18 80 L46 82" fill="none" stroke="#888" stroke-width="0.8"/>'
      : '<path d="M82 80 L54 82" fill="none" stroke="#888" stroke-width="0.8"/>';
    return '<path d="'+d+'" fill="#fafaf7" stroke="#888" stroke-width="1"/>'+puno;
  }
  function siluetaCapucha(){
    return '<path d="M28 22 L18 28 L18 40 L28 38 L28 88 L72 88 L72 38 L82 40 L82 28 L72 22 L62 14 Q50 6 38 14 Z" fill="#fafaf7" stroke="#888" stroke-width="1"/>'
      + '<path d="M36 8 Q50 2 64 8 L64 18 Q50 22 36 18 Z" fill="#eee" stroke="#888" stroke-width="1"/>';
  }
  function bounds(){
    if(zona==='delantera'||zona==='trasera'){
      var dims={
        'pequena':{w:10,h:8},
        'mediana':{w:20,h:16},
        'grande':{w:36,h:28},
        'completa':{w:46,h:54}
      }[tam] || {w:20,h:16};
      var cx=50, cy=44;
      if(tam==='completa'){cx=50; cy=55;}
      else if(tam==='grande'){cx=50; cy=52;}
      else{
        if(pos==='izq'){cx=38;}
        else if(pos==='dcha'){cx=62;}
        else if(pos==='arriba'){cy=32;}
        else if(pos==='abajo'){cy=72;}
      }
      return {x:cx-dims.w/2, y:cy-dims.h/2, w:dims.w, h:dims.h};
    }
    if(zona==='manga-corta-izq') return {x:22, y:28, w:20, h:12};
    if(zona==='manga-corta-dcha') return {x:58, y:28, w:20, h:12};
    if(zona==='manga-larga-izq') return {x:22, y:42, w:20, h:14};
    if(zona==='manga-larga-dcha') return {x:58, y:42, w:20, h:14};
    if(zona==='capucha') return {x:42, y:8, w:16, h:8};
    if(zona==='otra') return {x:40, y:42, w:20, h:16};
    return {x:40, y:42, w:20, h:16};
  }
  var silueta='';
  if(zona==='manga-corta-izq') silueta=siluetaMangaCorta(true);
  else if(zona==='manga-corta-dcha') silueta=siluetaMangaCorta(false);
  else if(zona==='manga-larga-izq') silueta=siluetaMangaLarga(true);
  else if(zona==='manga-larga-dcha') silueta=siluetaMangaLarga(false);
  else if(zona==='capucha') silueta=siluetaCapucha();
  else silueta=siluetaCamiseta();
  var b=bounds();
  var rect='<rect x="'+b.x+'" y="'+b.y+'" width="'+b.w+'" height="'+b.h+'" fill="'+gr+'" stroke="'+grS+'" stroke-width="0.8"/>';
  var orientLabel='';
  if(zona==='trasera'){
    orientLabel='<text x="50" y="95" text-anchor="middle" font-size="6" fill="#888" font-weight="bold">TRASERA</text>';
  } else if(zona==='otra'){
    orientLabel='<text x="50" y="95" text-anchor="middle" font-size="6" fill="#854F0B" font-weight="bold">OTRA</text>';
  }
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'
    +silueta+rect+orientLabel
    +'</svg>';
}

function renderEstampacionCard(e){
  var zonaLbl=e.zona==='otra'?(e.posicionLibre||'Otra'):(ZONA_LABEL[e.zona]||e.zona||'-');
  var tamLbl=TAMANO_LABEL[e.tamano]||e.tamano||'';
  var posLbl=e.posicion?(POSICION_LABEL[e.posicion]):'';
  var tag='';
  if(e.tecnica==='1-tinta')tag='<span class="estamp-tag tag-seri">SERIGRAFÍA</span>';
  else if(e.tecnica==='bordado')tag='<span class="estamp-tag tag-bord">BORDADO</span>';
  else if(e.tecnica==='dtf'||e.color==='todo-color')tag='<span class="estamp-tag tag-dtf">DTF</span>';
  var contenidoTxt=e.tipoContenido?(TIPOCONT_LABEL[e.tipoContenido]||e.tipoContenido):'';
  var colorTxt='';
  if(e.color==='todo-color')colorTxt='Todo color';
  else if(e.color)colorTxt=e.color;
  var descripcion=e.descripcion||'';

  var html='<div class="estamp-card">';
  html+='<div class="estamp-svg">'+pictogramaEstampacion(e,90)+'</div>';
  html+='<div class="estamp-info">';
  html+='<div class="estamp-zona">'+zonaLbl+'</div>';
  html+='<div>'+tag;
  if(tamLbl)html+='<span style="font-size:12px;color:#444"><b>'+tamLbl+'</b>'+(posLbl?' &middot; '+posLbl:'')+'</span>';
  html+='</div>';
  if(contenidoTxt)html+='<div class="estamp-row">Tipo: <b>'+contenidoTxt+'</b></div>';
  if(descripcion)html+='<div class="estamp-row">Qué va: <b>'+descripcion+'</b></div>';
  if(colorTxt)html+='<div class="estamp-row">Color: <b>'+colorTxt+'</b></div>';
  html+='</div></div>';
  return html;
}

function fmtFecha(s){
  if(!s)return 'Sin fecha';
  var d=new Date(s+'T12:00:00');
  return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
}

function cargarPedido(){
  var p=new URLSearchParams(window.location.search).get('p');
  if(!p){
    document.getElementById('cont').innerHTML='<div class="error">⚠️ Falta el ID del pedido en la URL.<br><br>Formato correcto: <code>ficha.html?p=TX-0073</code></div>';
    return;
  }
  fetch(SUPA+'/rest/v1/pedidos?id=eq.'+encodeURIComponent(p)+'&select=*',{headers:{apikey:KEY}})
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data||!data.length){
        document.getElementById('cont').innerHTML='<div class="error">⚠️ Pedido no encontrado: '+p+'</div>';
        return;
      }
      renderFicha(data[0]);
    })
    .catch(function(e){
      document.getElementById('cont').innerHTML='<div class="error">⚠️ Error al cargar el pedido: '+e.message+'</div>';
    });
}

function renderFicha(p){
  var esTX=p.seccion==='TX';
  var esPrendaCli=esPrendaCliente(p);
  var qtyMatch=(p.descripcion||'').match(/×\s*(\d+)/);
  var qty=qtyMatch?qtyMatch[1]:'';
  var fechaTxt=fmtFecha(p.fecha_entrega);
  var esFija=p.fecha_tipo==='fija';

  var html='<div class="top"><h1>'+p.id+'</h1><div class="fecha'+(esFija?' fecha-fija':'')+'">Entrega'+(esFija?' FIJA':'')+': <b>'+fechaTxt+'</b></div></div>';
  html+='<div class="desc"><b>'+(p.cliente_nombre||'')+'</b> · '+(p.descripcion||'')+(qty?' · <b>'+qty+' uds</b>':'')+'</div>';
  html+='<div class="acciones"><button class="btn btn-print" onclick="window.print()">🖨️ Imprimir</button></div>';

  if(esPrendaCli && p.tipo_prenda_cliente){
    html+='<div class="aviso">📦 <div><b>PRENDA DEL CLIENTE:</b> '+p.tipo_prenda_cliente+'</div></div>';
  }

  if(esTX){
    if(p.tallas_colores && p.tallas_colores.length){
      if(p.tipo_personalizacion==='individual'){
        html+='<div class="tabla-wrap"><table><tr><th>#</th><th>Prenda</th><th>Color</th><th>Talla</th><th>Nombre</th><th>Nº</th></tr>';
        p.tallas_colores.forEach(function(f,i){
          if(!f.nombre)return;
          html+='<tr><td>'+(i+1)+'</td><td>'+(f.prenda||'Camiseta')+'</td><td><span class="cdot" style="background:'+(f.hex||'#888')+'"></span>'+(f.color||'')+'</td><td><b>'+(f.talla||'')+'</b></td><td><b>'+(f.nombre||'')+'</b></td><td><b>'+(f.numero||'')+'</b></td></tr>';
        });
        html+='</table></div>';
      }else{
        var tallas=['XS','S','M','L','XL','XXL','3XL'];
        html+='<div class="tabla-wrap"><table><tr><th>Color</th>'+tallas.map(function(t){return'<th>'+t+'</th>';}).join('')+'<th>Total</th></tr>';
        var granTotal=0;
        p.tallas_colores.forEach(function(f){
          var rowTotal=tallas.reduce(function(s,t){return s+(parseInt((f.tallas||{})[t])||0);},0);
          if(rowTotal===0)return;
          granTotal+=rowTotal;
          html+='<tr><td><span class="cdot" style="background:'+(f.hex||'#888')+'"></span>'+(f.color||'?')+'</td>'+tallas.map(function(t){var v=parseInt((f.tallas||{})[t])||0;return'<td>'+(v||'')+'</td>';}).join('')+'<td><b>'+rowTotal+'</b></td></tr>';
        });
        html+='<tr style="background:#eee;font-weight:700"><td>TOTAL</td>'+tallas.map(function(){return'<td></td>';}).join('')+'<td>'+granTotal+'</td></tr></table></div>';
      }
    }
  }

  if(p.estampaciones && p.estampaciones.length){
    html+='<div class="estamp-bloque">';
    html+='<h3>🎨 Estampaciones / Bordados</h3>';
    p.estampaciones.forEach(function(e){
      html+=renderEstampacionCard(e);
    });
    html+='</div>';
  }

  if(!esTX){
    html+='<div class="bloque">';
    html+='<h3>📋 Datos para producción</h3>';
    html+='<div class="kv"><span>Producto</span><b>'+(p.descripcion||'-')+'</b></div>';
    if(qty)html+='<div class="kv"><span>Cantidad</span><b>'+qty+' unidades</b></div>';
    if(p.seccion)html+='<div class="kv"><span>Sección taller</span><b>'+p.seccion+'</b></div>';
    html+='</div>';
  }

  html+='<div class="previa" id="previa-section"><div style="font-size:11px;color:#888">Cargando previa...</div></div>';

  if(p.anotacion_operario && p.anotacion_operario.trim()){
    html+='<div class="notas"><span class="lbl">📝 Notas del operario</span>'+p.anotacion_operario.replace(/\n/g,'<br>')+'</div>';
  }

  html+='<div class="footer">Print & Copy · '+new Date().toLocaleDateString('es-ES')+' · '+p.id+'</div>';

  document.getElementById('cont').innerHTML=html;

  fetch(SUPA+'/rest/v1/pedido_previas?pedido_id=eq.'+encodeURIComponent(p.id)+'&order=version.desc&limit=1&select=imagen_url,estado',{headers:{apikey:KEY}})
    .then(function(r){return r.json();})
    .then(function(d){
      var s=document.getElementById('previa-section');
      if(!s)return;
      if(d&&d.length&&d[0].imagen_url){
        s.innerHTML='<div style="font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;font-weight:700">'+(esTX?'Previa aprobada':'Arte aprobado')+'</div><img src="'+d[0].imagen_url+'">';
      }else{
        s.innerHTML='<div style="color:#aaa;font-size:12px;padding:14px;border:1px dashed #ddd;border-radius:6px">Sin previa aprobada</div>';
      }
    })
    .catch(function(){
      var s=document.getElementById('previa-section');
      if(s)s.innerHTML='<div style="color:#aaa;font-size:12px">Sin previa</div>';
    });
}

cargarPedido();
</script>
</body>
</html>
