<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print & Copy v36</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f5f5f0;min-height:100vh;color:#1a1a1a}
header{background:#1a1a1a;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:16px}
header h1{font-size:16px;font-weight:500;white-space:nowrap}
.clock-time{font-size:13px;color:#aaa;font-family:monospace}
.clock-date{font-size:11px;color:#777;margin-top:1px}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#666;display:inline-block;margin-right:4px}
.conn-dot.ok{background:#4ade80}.conn-dot.err{background:#f87171}
.nav-tabs{display:flex;gap:3px}
.nav-tab{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:#ccc;cursor:pointer;font-size:13px;font-weight:500}
.nav-tab.active,.nav-tab:hover{background:#333;color:#fff}
.screen{display:none;padding:16px 20px;max-width:1200px;margin:0 auto}
.screen.active{display:block}
.card{background:#fff;border-radius:10px;border:0.5px solid #ddd;padding:14px 18px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
label{display:block;font-size:12px;color:#666;margin-bottom:3px;font-weight:500}
input,select,textarea{width:100%;padding:7px 10px;border:0.5px solid #ccc;border-radius:6px;font-size:13px;color:#1a1a1a;background:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:#378ADD}
textarea{resize:vertical;min-height:60px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.field{margin-bottom:0}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.sec-TX{background:#fce8e8;color:#7a1a1a}.sec-PL{background:#e8f0fe;color:#1a3a7a}
.sec-UV{background:#e8fce8;color:#1a5a1a}.sec-SUB{background:#fef3e8;color:#7a4a1a}
.sec-NEON{background:#f3e8fe;color:#4a1a7a}.sec-XR{background:#e8fef8;color:#1a5a4a}
.btn{padding:7px 14px;border-radius:7px;border:none;font-size:13px;font-weight:500;cursor:pointer}
.btn-primary{background:#185FA5;color:#fff}.btn-primary:hover{background:#0C447C}
.btn-success{background:#3B6D11;color:#fff}.btn-success:hover{background:#2a5009}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-secondary{background:#f0f0f0;color:#333;border:0.5px solid #ddd}
.btn-danger{background:#FCEBEB;color:#A32D2D;border:0.5px solid #f7c1c1}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
.search-box{position:relative}
.search-results{position:absolute;top:100%;left:0;right:0;background:#fff;border:0.5px solid #ccc;border-radius:0 0 7px 7px;z-index:50;max-height:200px;overflow-y:auto;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.sr-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:0.5px solid #f0f0f0}
.sr-item:hover{background:#f5f5f5}
.sr-item .sn{font-weight:500}.sr-item .ss{font-size:11px;color:#888}
.stat-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:8px;border:0.5px solid #ddd;padding:9px 14px;flex:1;min-width:80px}
.stat-card .sv{font-size:18px;font-weight:700}
.stat-card .sl{font-size:11px;color:#888;margin-top:1px}
.fase-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.fase-0{background:#f1efe8;color:#5f5e5a}.fase-1{background:#E6F1FB;color:#185FA5}
.fase-2{background:#FAEEDA;color:#BA7517}.fase-3{background:#EEEDFE;color:#534AB7}
.fase-4{background:#fef3e8;color:#7a4a1a}.fase-5{background:#EAF3DE;color:#3B6D11}
.fase-6{background:#e8fce8;color:#1a5a1a;border:1px solid #9FE1CB}
.pres-estado{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.pres-guardado{background:#E6F1FB;color:#185FA5}
.pres-enviado{background:#FAEEDA;color:#BA7517}
.pres-aceptado{background:#EAF3DE;color:#3B6D11}
.pres-rechazado{background:#FCEBEB;color:#A32D2D}
.taller-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.view-tabs{display:flex;gap:3px;background:#fff;border-radius:8px;border:0.5px solid #ddd;padding:3px}
.view-tab{padding:5px 12px;border-radius:5px;border:none;background:transparent;font-size:12px;font-weight:500;color:#888;cursor:pointer}
.view-tab.active{background:#1a1a1a;color:#fff}
.taller-filters{background:#fff;border-radius:10px;border:0.5px solid #ddd;padding:12px 16px;margin-bottom:12px}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;align-items:center}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:11px;color:#bbb;font-weight:600;min-width:50px}
.filter-btn{padding:3px 10px;border-radius:20px;border:0.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;font-weight:500}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.sort-select{padding:4px 8px;border-radius:6px;border:0.5px solid #ddd;font-size:12px;background:#fff}
.taller-card{background:#fff;border-radius:8px;border:0.5px solid #ddd;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:box-shadow .15s}
.taller-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.taller-card.tiene-montaje{border-left:3px solid #534AB7}
.taller-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #f0f0f0;gap:8px;flex-wrap:wrap}
.taller-body{padding:10px 14px}
.taller-body p{font-size:13px;color:#444;margin-bottom:4px}
.pendiente-pill{background:#FCEBEB;color:#A32D2D;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700}
.pagado-pill{background:#EAF3DE;color:#3B6D11;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700}
.ventas-grid{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
@media(max-width:900px){.ventas-grid{grid-template-columns:1fr}}
.ventas-right{position:sticky;top:70px}
@media(max-width:900px){.ventas-right{position:static}}
.calc-result{background:#1a1a1a;border-radius:10px;padding:14px 18px;color:#fff;margin-top:12px}
.calc-result .price{font-size:24px;font-weight:800;color:#DCC25C}
.calc-result .unit{font-size:12px;color:#aaa;margin-top:4px}
.extras-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.extra-toggle{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;border:0.5px solid #ddd;font-size:12px;cursor:pointer;background:#fff}
.extra-toggle.on{border-color:#378ADD;background:#E6F1FB;color:#185FA5}
.extra-toggle input{width:auto;margin:0;cursor:pointer}
.linea-item{background:#f9f9f7;border:0.5px solid #eee;border-radius:7px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.linea-item .info{flex:1;min-width:0}
.linea-item .desc{font-size:13px;font-weight:500;color:#1a1a1a}
.linea-item .meta{font-size:11px;color:#888;margin-top:2px}
.linea-item .price{font-size:14px;font-weight:700;color:#185FA5;white-space:nowrap}
.linea-item .remove{background:none;border:none;color:#aaa;cursor:pointer;font-size:16px;padding:4px}
.linea-item .remove:hover{color:#A32D2D}
.sug-box{background:#FFFBF0;border:1px solid #FAC775;border-radius:8px;padding:10px 12px;margin-top:10px}
.sug-title{font-size:11px;font-weight:700;color:#854F0B;text-transform:uppercase;margin-bottom:6px}
.sug-item{font-size:12px;color:#666;padding:4px 0;cursor:pointer}
.sug-item:hover{color:#185FA5}
.pres-card{background:#fff;border-radius:8px;border:0.5px solid #ddd;margin-bottom:8px;padding:12px 16px;cursor:pointer;transition:box-shadow .15s}
.pres-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.cliente-card{background:#fff;border-radius:7px;border:0.5px solid #ddd;padding:11px 15px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer}
.cliente-card:hover{background:#f9f9f9}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;padding:30px 16px}
.modal-overlay.open{display:block}
.modal{background:#fff;border-radius:12px;padding:22px;width:100%;max-width:600px;margin:0 auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
.empty-state{text-align:center;padding:36px 20px;color:#aaa;font-size:14px}
.user-badge{background:#333;padding:4px 10px;border-radius:20px;font-size:12px}
.user-badge select{background:transparent;border:none;color:#fff;font-size:12px;cursor:pointer;outline:none}
.resguardo{background:#fff;border:1px solid #ddd;border-radius:8px;padding:18px;font-size:13px}
.rh{text-align:center;margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:10px}
.rh h2{font-size:17px;font-weight:700}
.rnum{font-size:22px;font-weight:800;font-family:monospace;color:#185FA5;margin:5px 0}
.rrow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid #f5f5f5}
.rlabel{color:#999;font-size:12px}
.rval{font-weight:500;text-align:right;font-size:13px}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <h1>🖨️ Print & Copy</h1>
    <div id="clock-wrap" style="display:none"><div class="clock-time" id="clock-time"></div><div class="clock-date" id="clock-date"></div></div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="user-badge">👤 <select id="current-user" onchange="setUser(this.value)"><option>Marilia</option><option>Álvaro</option><option>Charo</option><option>Raúl</option><option>Bea</option></select></div>
    <span id="conn-status" style="font-size:11px;color:#aaa"><span class="conn-dot" id="conn-dot"></span></span>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showScreen('ventas',this)">Ventas</button>
      <button class="nav-tab" onclick="showScreen('taller',this)">Taller</button>
      <button class="nav-tab" onclick="showScreen('clientes',this)">Clientes</button>
    </div>
  </div>
</header>

<!-- VENTAS -->
<div id="screen-ventas" class="screen active">
  <div class="taller-top">
    <div style="display:flex;gap:10px;align-items:center">
      <h2 style="font-size:16px;font-weight:600;margin:0">Ventas</h2>
      <button class="btn btn-primary" onclick="nuevaVenta()">+ Nueva venta</button>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <select class="sort-select" id="ventas-filtro" onchange="renderVentas()">
        <option value="all">Todas</option>
        <option value="guardado">Guardadas</option>
        <option value="enviado">Enviadas</option>
        <option value="aceptado">Aceptadas</option>
      </select>
      <button class="btn btn-secondary btn-sm" onclick="cargarDatos()">↻</button>
    </div>
  </div>
  <div class="stat-row" id="ventas-stats"></div>
  <div id="ventas-list"></div>
</div>

<!-- TALLER -->
<div id="screen-taller" class="screen">
  <div class="taller-top">
    <div class="view-tabs">
      <button class="view-tab active" onclick="setView('lista',this)">Lista</button>
      <button class="view-tab" onclick="setView('semana',this)">Semana</button>
    </div>
    <div style="display:flex;gap:6px">
      <select class="sort-select" id="sec-filter" onchange="renderTaller()">
        <option value="all">Todas</option>
        <option value="TX">TX</option><option value="PL">PL</option><option value="UV">UV</option>
        <option value="SUB">SUB</option><option value="NEON">NEON</option><option value="XR">XR</option>
      </select>
    </div>
  </div>
  <div class="stat-row" id="taller-stats"></div>
  <div class="taller-filters" id="filtros-taller">
    <div class="filter-row"><span class="filter-label">Fase</span>
      <button class="filter-btn active" data-f="fase" data-v="all" onclick="setFilter(this)">Todos</button>
      <button class="filter-btn" data-f="fase" data-v="0" onclick="setFilter(this)">Nuevo</button>
      <button class="filter-btn" data-f="fase" data-v="4" onclick="setFilter(this)">Producción</button>
      <button class="filter-btn" data-f="fase" data-v="5" onclick="setFilter(this)">Terminado</button>
      <button class="filter-btn" data-f="fase" data-v="6" onclick="setFilter(this)">Cobrado</button>
    </div>
    <div class="filter-row"><span class="filter-label">Pago</span>
      <button class="filter-btn active" data-f="pago" data-v="all" onclick="setFilter(this)">Todos</button>
      <button class="filter-btn" data-f="pago" data-v="pend" onclick="setFilter(this)">Pendiente</button>
      <button class="filter-btn" data-f="pago" data-v="ok" onclick="setFilter(this)">Pagado</button>
    </div>
  </div>
  <div id="taller-list"></div>
</div>

<!-- CLIENTES -->
<div id="screen-clientes" class="screen">
  <div class="card" style="margin-bottom:10px"><input type="text" id="search-clientes" placeholder="Buscar cliente..." oninput="renderClientes(this.value)"></div>
  <div id="clientes-list"></div>
</div>

<!-- MODAL: Nueva Venta -->
<div class="modal-overlay" id="modal-venta">
  <div class="modal" style="max-width:1100px;max-height:95vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3>Nueva venta</h3>
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-venta')">✕</button>
    </div>
    <div class="ventas-grid">
      <div class="ventas-left">
        <!-- Cliente -->
        <div class="card">
          <div class="card-title">Cliente</div>
          <div class="search-box" style="margin-bottom:10px">
            <input type="text" id="v-buscar" placeholder="Buscar cliente existente..." oninput="buscarCliente(this.value)" autocomplete="off">
            <div class="search-results" id="v-resultados"></div>
          </div>
          <div class="form-grid-4">
            <div class="field"><label>Nombre</label><input type="text" id="v-nombre"></div>
            <div class="field"><label>Teléfono</label><input type="tel" id="v-tel"></div>
            <div class="field"><label>Email</label><input type="email" id="v-email"></div>
            <div class="field"><label>Sector</label>
              <select id="v-sector"><option value="">—</option><option value="particular">Particular</option><option value="hosteleria">Hostelería</option><option value="comercio">Comercio</option><option value="empresa">Empresa</option></select>
            </div>
          </div>
        </div>
        <!-- Calculadora -->
        <div class="card">
          <div class="card-title">Añadir producto</div>
          <div class="form-grid">
            <div class="field"><label>Categoría</label>
              <select id="v-cat" onchange="onCatChange()">
                <option value="">— Seleccionar —</option>
                <optgroup label="Impresión">
                  <option value="tarjetas">Tarjetas de visita</option>
                  <option value="flyers">Flyers / Dípticos</option>
                  <option value="carteles">Carteles</option>
                  <option value="carpetas">Carpetas</option>
                  <option value="pegatinas">Pegatinas</option>
                  <option value="sellos">Sellos</option>
                </optgroup>
                <optgroup label="Gran formato">
                  <option value="rollup">Roll Up</option>
                  <option value="xbanner">X Banner</option>
                  <option value="banderas">Banderas</option>
                  <option value="placas">Placas</option>
                  <option value="rotulacion">Rotulación (m²)</option>
                </optgroup>
                <optgroup label="Textil">
                  <option value="textil">Camisetas / Prendas</option>
                </optgroup>
              </select>
            </div>
            <div class="field" id="wrap-c1" style="display:none"><label id="lbl-c1"></label><select id="v-c1" onchange="calcPrecio()"></select></div>
          </div>
          <div class="form-grid" id="wrap-c2c3" style="display:none;margin-top:10px">
            <div class="field" id="wrap-c2"><label id="lbl-c2"></label><input type="number" id="v-c2" min="1" oninput="calcPrecio()"></div>
            <div class="field" id="wrap-c3" style="display:none"><label id="lbl-c3"></label><select id="v-c3" onchange="calcPrecio()"></select></div>
          </div>
          <div id="wrap-extras" style="display:none;margin-top:10px"><label>Extras</label><div class="extras-grid" id="v-extras"></div></div>
          <div id="v-result" class="calc-result" style="display:none">
            <div style="font-size:12px;color:#aaa">Precio</div>
            <div class="price" id="v-precio">0,00 €</div>
            <div class="unit" id="v-unit"></div>
          </div>
          <div id="v-upsell" class="sug-box" style="display:none"><div class="sug-title">💡 Sugerencia</div><div id="v-upsell-content"></div></div>
          <div class="btn-row"><button class="btn btn-primary" id="btn-add-calc" onclick="addLineaCalc()" style="display:none">+ Añadir al presupuesto</button></div>
        </div>
        <!-- Línea manual -->
        <div class="card">
          <div class="card-title">Línea manual</div>
          <div class="form-grid-3">
            <div class="field"><label>Sección</label><select id="v-msec"><option value="TX">TX</option><option value="PL">PL</option><option value="UV">UV</option><option value="XR">XR</option></select></div>
            <div class="field"><label>Descripción</label><input type="text" id="v-mdesc"></div>
            <div class="field"><label>Precio €</label><input type="number" id="v-mprecio" step="0.01" min="0"></div>
          </div>
          <div class="btn-row"><button class="btn btn-secondary" onclick="addLineaManual()">+ Añadir manual</button></div>
        </div>
        <!-- Entrega -->
        <div class="card">
          <div class="card-title">Entrega</div>
          <div class="form-grid-3">
            <div class="field"><label>Fecha</label><input type="date" id="v-fecha"></div>
            <div class="field"><label>Tipo</label><select id="v-ftipo"><option value="aprox">Aproximada</option><option value="fija">Fija</option></select></div>
            <div class="field"><label>Operario</label><select id="v-operario"><option>Marilia</option><option>Álvaro</option><option>Charo</option><option>Raúl</option><option>Bea</option></select></div>
          </div>
        </div>
      </div>
      <!-- Resumen -->
      <div class="ventas-right">
        <div class="card">
          <div class="card-title">Resumen</div>
          <div id="v-lineas"></div>
          <div id="v-lineas-empty" style="text-align:center;padding:20px;color:#aaa;font-size:13px">Sin líneas</div>
          <div style="border-top:1px solid #eee;padding-top:10px;margin-top:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:#888;font-size:13px">Subtotal</span><span id="v-subtotal">0,00 €</span></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="color:#888;font-size:13px">Dto %</span><input type="number" id="v-dto" value="0" min="0" max="100" style="width:50px;text-align:right" oninput="calcTotales()"></div>
            <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700;border-top:1px solid #eee;padding-top:8px"><span>Total</span><span id="v-total" style="color:#185FA5">0,00 €</span></div>
          </div>
        </div>
        <div id="v-cross" class="card" style="display:none"><div class="card-title">💡 Cross-selling</div><div id="v-cross-content"></div></div>
        <div class="card"><div class="card-title">Notas</div><textarea id="v-notas" rows="2"></textarea></div>
        <div class="card">
          <div class="form-grid">
            <div class="field"><label>Validez días</label><input type="number" id="v-validez" value="15" min="1"></div>
            <div class="field"><label>Condición pago</label><select id="v-pago"><option value="50_50">50% · 50%</option><option value="100_0">100% encargar</option><option value="0_100">100% recoger</option></select></div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">
          <button class="btn btn-secondary" onclick="guardarVenta('guardado')">💾 Guardar cotización</button>
          <button class="btn btn-primary" onclick="guardarVenta('enviado')">📤 Guardar y enviar</button>
          <button class="btn btn-success" onclick="crearPedido()">✓ Crear pedido directo</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Ver Cotización -->
<div class="modal-overlay" id="modal-cot">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;margin-bottom:14px"><div id="cot-title"></div><button class="btn btn-secondary btn-sm" onclick="closeModal('modal-cot')">✕</button></div>
    <div id="cot-body"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('modal-cot')">Cerrar</button>

// UTILS
// ══════════════════════════════════════════════════════════════
function r2(n){return Math.round(n*100)/100;}
function fmt(n){return n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function tIdx(t,q){var i=0;for(var j=0;j<t.length;j++){if(q>=t[j])i=j;}return i;}
function fmtDate(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fmtDT(iso){if(!iso)return'';var d=new Date(iso);return d.toLocaleDateString('es-ES')+' '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});}
function setUser(u){currentUser=u;localStorage.setItem('pc_user',u);}

function startClock(){document.getElementById('clock-wrap').style.display='block';function t(){var n=new Date();document.getElementById('clock-time').textContent=n.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('clock-date').textContent=n.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});}t();setInterval(t,1000);}

function renderVentas(){

  var tot=presupuestos.length,guard=presupuestos.filter(function(p){return p.estado==='guardado';}).length;
  var env=presupuestos.filter(function(p){return p.estado==='enviado';}).length;
  var acep=presupuestos.filter(function(p){return p.estado==='aceptado';}).length;
  var val=presupuestos.reduce(function(s,p){return s+(parseFloat(p.total)||0);},0);
  document.getElementById('ventas-stats').innerHTML='<div class="stat-card"><div class="sv">'+tot+'</div><div class="sl">Total</div></div><div class="stat-card"><div class="sv" style="color:#185FA5">'+guard+'</div><div class="sl">Guardadas</div></div><div class="stat-card"><div class="sv" style="color:#BA7517">'+env+'</div><div class="sl">Enviadas</div></div><div class="stat-card"><div class="sv" style="color:#3B6D11">'+acep+'</div><div class="sl">Aceptadas</div></div><div class="stat-card"><div class="sv">'+val.toFixed(0)+'€</div><div class="sl">Valor</div></div>';
  if(!list.length){document.getElementById('ventas-list').innerHTML='<div class="empty-state">Sin cotizaciones</div>';return;}
  document.getElementById('ventas-list').innerHTML=list.map(function(p){
    return '<div class="pres-card" onclick="verCot(\''+p.id+'\')"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:8px"><span style="font-family:monospace;font-weight:700">'+p.numero+'</span><span class="pres-estado pres-'+p.estado+'">'+(p.estado||'').toUpperCase()+'</span><span style="font-weight:600;color:#185FA5">'+fmt(p.total||0)+'</span></div><span style="font-size:12px;color:#888">'+fmtDate(p.fecha_expiracion)+'</span></div><div style="margin-top:6px;font-size:13px"><strong>'+p.cliente_nombre+'</strong>'+(p.cliente_telefono?' · '+p.cliente_telefono:'')+'</div></div>';
  }).join('');
}

function buscarCliente(q){
  var box=document.getElementById('v-resultados');

  var res=clientes.filter(function(c){return c.nombre.toLowerCase().includes(q.toLowerCase())||(c.telefono&&c.telefono.includes(q));}).slice(0,5);
  if(!res.length){box.style.display='none';return;}
  box.innerHTML=res.map(function(c){return '<div class="sr-item" onclick="selCliente('+c.id+')"><div class="sn">'+c.nombre+'</div><div class="ss">'+(c.telefono||'')+'</div></div>';}).join('');
  box.style.display='block';
}
function selCliente(id){
  var c=clientes.find(function(x){return x.id===id;});if(!c)return;
  document.getElementById('v-nombre').value=c.nombre;document.getElementById('v-tel').value=c.telefono||'';document.getElementById('v-email').value=c.email||'';document.getElementById('v-sector').value=c.sector||'';

}

function onCatChange(){

  if(!prod)return;
  if(prod.c1){document.getElementById('wrap-c1').style.display='block';document.getElementById('lbl-c1').textContent=prod.c1.l;document.getElementById('v-c1').innerHTML=prod.c1.o.map(function(o){return '<option>'+o+'</option>';}).join('');}
  if(prod.c2){document.getElementById('wrap-c2c3').style.display='grid';document.getElementById('wrap-c2').style.display='block';document.getElementById('lbl-c2').textContent=prod.c2.l;document.getElementById('v-c2').value='';document.getElementById('v-c2').placeholder='mín. '+(prod.c2.min||1);}
  if(prod.c3){document.getElementById('wrap-c3').style.display='block';document.getElementById('lbl-c3').textContent=prod.c3.l;document.getElementById('v-c3').innerHTML=prod.c3.o.map(function(o){return '<option>'+o+'</option>';}).join('');}
  if(prod.ex&&prod.ex.length){document.getElementById('wrap-extras').style.display='block';document.getElementById('v-extras').innerHTML=prod.ex.map(function(e){return '<label class="extra-toggle"><input type="checkbox" id="ex-'+e.id+'" onchange="calcPrecio()"> '+e.l+'</label>';}).join('');}
}

function calcPrecio(){
  var cat=document.getElementById('v-cat').value,prod=P[cat];if(!prod)return;
  var c1=document.getElementById('v-c1')?document.getElementById('v-c1').value:'';
  var c2=parseFloat(document.getElementById('v-c2')?document.getElementById('v-c2').value:0)||0;
  var c3=document.getElementById('v-c3')?document.getElementById('v-c3').value:'';
  var ex={};if(prod.ex)prod.ex.forEach(function(e){var el=document.getElementById('ex-'+e.id);if(el&&el.checked)ex[e.id]=true;});
  var res=prod.calc(c1,c2,ex,c3);
  if(!res){document.getElementById('v-result').style.display='none';document.getElementById('btn-add-calc').style.display='none';return;}
  document.getElementById('v-result').style.display='block';document.getElementById('btn-add-calc').style.display='inline-block';
  document.getElementById('v-precio').textContent=fmt(res.t);
  document.getElementById('v-unit').textContent=res.pu?fmt(res.pu)+'/u × '+res.q+' uds':(res.q>1?res.q+' uds':'');
  if(prod.up){var sug=prod.up(c1,c2,res);if(sug){document.getElementById('v-upsell').style.display='block';document.getElementById('v-upsell-content').innerHTML='<div class="sug-item" onclick="aplicarUp()">'+sug+'</div>';}else{document.getElementById('v-upsell').style.display='none';}}else{document.getElementById('v-upsell').style.display='none';}
  window._lastCalc={cat:cat,prod:prod,c1:c1,c2:c2,c3:c3,ex:ex,res:res};
}
function aplicarUp(){var lc=window._lastCalc;if(!lc||!lc.prod.tiers)return;var i=tIdx(lc.prod.tiers,lc.c2);if(i<lc.prod.tiers.length-1){document.getElementById('v-c2').value=lc.prod.tiers[i+1];calcPrecio();}}

function addLineaCalc(){
  var lc=window._lastCalc;if(!lc||!lc.res)return;
  var desc=lc.prod.n;if(lc.c1)desc+=' '+lc.c1;if(lc.res.q>1)desc+=' ×'+lc.res.q;
  var exList=[];for(var k in lc.ex){if(lc.ex[k])exList.push(k);}if(exList.length)desc+=' +'+exList.join('+');
  lineas.push({sec:lc.prod.sec,desc:desc,total:lc.res.t,cat:lc.cat});
  renderLineas();showCross(lc.cat);
  document.getElementById('v-cat').value='';onCatChange();
}

function addLineaManual(){
  var sec=document.getElementById('v-msec').value;
  var desc=document.getElementById('v-mdesc').value.trim();
  var precio=parseFloat(document.getElementById('v-mprecio').value)||0;
  if(!desc||precio<=0){alert('Completa descripción y precio');return;}
  lineas.push({sec:sec,desc:desc,total:precio,manual:true});
  renderLineas();
  document.getElementById('v-mdesc').value='';document.getElementById('v-mprecio').value='';
}

function renderLineas(){
  var cont=document.getElementById('v-lineas'),empty=document.getElementById('v-lineas-empty');
  if(!lineas.length){cont.innerHTML='';empty.style.display='block';calcTotales();return;}
  empty.style.display='none';
  cont.innerHTML=lineas.map(function(l,i){
    return '<div class="linea-item"><div class="info"><span class="badge sec-'+l.sec+'">'+l.sec+'</span> <span class="desc">'+l.desc+'</span></div><span class="price">'+fmt(l.total)+'</span><button class="remove" onclick="quitarLinea('+i+')">✕</button></div>';
  }).join('');
  calcTotales();
}
function quitarLinea(i){lineas.splice(i,1);renderLineas();}

function calcTotales(){
  var sub=lineas.reduce(function(s,l){return s+l.total;},0);
  var dto=parseFloat(document.getElementById('v-dto').value)||0;
  var total=sub*(1-dto/100);
  document.getElementById('v-subtotal').textContent=fmt(sub);
  document.getElementById('v-total').textContent=fmt(total);
}

function showCross(cat){
  var list=CROSS[cat];if(!list||!list.length){document.getElementById('v-cross').style.display='none';return;}
  document.getElementById('v-cross').style.display='block';
  document.getElementById('v-cross-content').innerHTML=list.map(function(c){var p=P[c];return p?'<div class="sug-item">'+p.n+'</div>':'';}).join('');
}

function guardarVenta(estado){
  var nombre=document.getElementById('v-nombre').value.trim();
  if(!nombre){alert('Nombre obligatorio');return;}
  if(!lineas.length){alert('Añade al menos una línea');return;}
  var tel=document.getElementById('v-tel').value.trim();
  var email=document.getElementById('v-email').value.trim();
  var validez=parseInt(document.getElementById('v-validez').value)||15;
  var hoy=new Date();
  var fechaExp=new Date(hoy.getTime()+validez*24*60*60*1000).toISOString().split('T')[0];
  var sub=lineas.reduce(function(s,l){return s+l.total;},0);
  var dto=parseFloat(document.getElementById('v-dto').value)||0;
  var total=r2(sub*(1-dto/100));
  
  sb.from('contador_global').select('valor').eq('tipo','presupuesto').single().then(function(r){
    var num=(r.data?r.data.valor:0)+1;
    var numero='PRES-'+String(num).padStart(6,'0');
    var data={numero:numero,cliente_nombre:nombre,cliente_telefono:tel,cliente_email:email,subtotal:sub,descuento_pct:dto,total:total,validez_dias:validez,fecha_expiracion:fechaExp,estado:estado,enviado:estado==='enviado',notas:document.getElementById('v-notas').value.trim()};
    sb.from('contador_global').update({valor:num}).eq('tipo','presupuesto').then(function(){
      sb.from('presupuestos').insert([data]).select().then(function(r2){
        if(r2.error){alert('Error: '+r2.error.message);return;}
        var presId=r2.data[0].id;
        var lineasDB=lineas.map(function(l,i){return{presupuesto_id:presId,seccion:l.sec,descripcion:l.desc,cantidad:1,precio_unitario:l.total,subtotal:l.total,orden:i};});
        sb.from('presupuesto_lineas').insert(lineasDB).then(function(){
          closeModal('modal-venta');cargarDatos();alert('Cotización '+numero+' guardada');
        });
      });
    });
  });
}

function crearPedido(){
  var nombre=document.getElementById('v-nombre').value.trim();
  if(!nombre){alert('Nombre obligatorio');return;}
  if(!lineas.length){alert('Añade al menos una línea');return;}
  var tel=document.getElementById('v-tel').value.trim();
  var email=document.getElementById('v-email').value.trim();
  var fecha=document.getElementById('v-fecha').value;
  var operario=document.getElementById('v-operario').value;
  
  var cliente=clientes.find(function(c){return c.nombre.toLowerCase()===nombre.toLowerCase();});
  
  function crear(clienteId){
    var combinadoId=null;
    var totalGlobal=lineas.reduce(function(s,l){return s+l.total;},0);
    
    function crearPeds(){
      var proms=lineas.map(function(lin){
        return new Promise(function(res){
          var sec=lin.sec;
          sb.from('contadores').select('valor').eq('seccion',sec).single().then(function(r){
            var nv=(r.data?r.data.valor:0)+1;
            sb.from('contadores').update({valor:nv}).eq('seccion',sec).then(function(){
              var numPed=sec+'-'+String(nv).padStart(4,'0');
              var ped={id:numPed,cliente_id:clienteId,cliente_nombre:nombre,cliente_tel:tel,cliente_email:email,seccion:sec,operario:operario,fecha_creacion:new Date().toISOString(),fecha_entrega:fecha||null,fecha_tipo:'aprox',descripcion:lin.desc,total:lin.total,senal:0,pago:'pendiente',condiciones:'50% al encargar, 50% al recoger',fase:0,combinado_id:combinadoId,archivado:false};
              sb.from('pedidos').insert([ped]).then(function(){res(numPed);});
            });
          });
        });
      });
      Promise.all(proms).then(function(nums){closeModal('modal-venta');cargarDatos();alert('Pedidos: '+nums.join(', '));});
    }
    
    if(lineas.length>1){
      sb.from('contador_global').select('valor').eq('tipo','combinado').single().then(function(r){
        var nc=(r.data?r.data.valor:0)+1;
        sb.from('contador_global').update({valor:nc}).eq('tipo','combinado').then(function(){
          sb.from('combinados').insert([{numero:'COMB-'+String(nc).padStart(6,'0'),total:totalGlobal,estado:'activo'}]).select().then(function(r2){
            combinadoId=r2.data[0].id;crearPeds();
          });
        });
      });
    }else{crearPeds();}
  }
  
  if(cliente){crear(cliente.id);}
  else{sb.from('clientes').insert([{nombre:nombre,telefono:tel,email:email,nivel:'nuevo',pago:'50_50'}]).select().then(function(r){
    if(r.error){alert('Error');return;}
    clientes.push(r.data[0]);crear(r.data[0].id);
  });}
}

// VER COTIZACIÓN

function verCot(id){
  var p=presupuestos.find(function(x){return x.id===id;});if(!p)return;
  _cotActual=p;
  sb.from('presupuesto_lineas').select('*').eq('presupuesto_id',id).order('orden').then(function(r){
    var lins=r.data||[];
    var html=lins.map(function(l){return '<div style="padding:6px 0;border-bottom:0.5px solid #f0f0f0;display:flex;justify-content:space-between"><span><span class="badge sec-'+l.seccion+'">'+l.seccion+'</span> '+l.descripcion+'</span><span style="font-weight:600">'+fmt(l.subtotal)+'</span></div>';}).join('');
    document.getElementById('cot-title').innerHTML='<span style="font-family:monospace;font-weight:700;font-size:16px">'+p.numero+'</span> <span class="pres-estado pres-'+p.estado+'">'+(p.estado||'').toUpperCase()+'</span>';
    document.getElementById('cot-body').innerHTML='<div style="margin-bottom:10px"><strong>'+p.cliente_nombre+'</strong>'+(p.cliente_telefono?' · '+p.cliente_telefono:'')+'</div><div style="font-size:12px;color:#888;margin-bottom:12px">'+fmtDT(p.created_at)+'</div>'+html+'<div style="display:flex;justify-content:space-between;padding-top:10px;border-top:1px solid #ddd;margin-top:10px;font-weight:700;font-size:16px"><span>Total</span><span style="color:#185FA5">'+fmt(p.total)+'</span></div>';
    var conv=p.estado!=='aceptado'&&p.estado!=='rechazado';
    document.getElementById('cot-btn-enviar').style.display=(p.estado==='guardado')?'inline-block':'none';
    document.getElementById('cot-btn-convertir').style.display=conv?'inline-block':'none';
    document.getElementById('cot-btn-rechazar').style.display=conv?'inline-block':'none';
    document.getElementById('modal-cot').classList.add('open');
  });
}

function enviarCot(){if(!_cotActual)return;sb.from('presupuestos').update({estado:'enviado',enviado:true}).eq('id',_cotActual.id).then(function(){closeModal('modal-cot');cargarDatos();alert('Marcado como enviado');});}
function rechazarCot(){if(!_cotActual||!confirm('¿Rechazar?'))return;sb.from('presupuestos').update({estado:'rechazado'}).eq('id',_cotActual.id).then(function(){closeModal('modal-cot');cargarDatos();});}

function convertirCot(){
  if(!_cotActual)return;
  sb.from('presupuesto_lineas').select('*').eq('presupuesto_id',_cotActual.id).order('orden').then(function(r){
    var lins=r.data||[];if(!lins.length){alert('Sin líneas');return;}
    lineas=lins.map(function(l){return{sec:l.seccion,desc:l.descripcion,total:parseFloat(l.subtotal)||0};});
    document.getElementById('v-nombre').value=_cotActual.cliente_nombre||'';
    document.getElementById('v-tel').value=_cotActual.cliente_telefono||'';
    document.getElementById('v-email').value=_cotActual.cliente_email||'';
    closeModal('modal-cot');
    renderLineas();
    document.getElementById('modal-venta').classList.add('open');
    sb.from('presupuestos').update({estado:'aceptado',convertido:true}).eq('id',_cotActual.id).then(function(){cargarDatos();});
  });
}

// ══════════════════════════════════════════════════════════════
// TALLER
// ══════════════════════════════════════════════════════════════
function setFilter(el){
  var f=el.dataset.f,v=el.dataset.v;filters[f]=v;
  el.parentElement.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});el.classList.add('active');
  renderTaller();
}
function setView(v,el){document.querySelectorAll('.view-tab').forEach(function(t){t.classList.remove('active');});if(el)el.classList.add('active');renderTaller();}

function renderTaller(){
  var sec=document.getElementById('sec-filter').value;
  var list=pedidos.filter(function(p){
    if(sec!=='all'&&p.seccion!==sec)return false;
    if(filters.fase!=='all'&&p.fase!=parseInt(filters.fase))return false;
    if(filters.pago==='pend'&&p.total-p.senal<=0)return false;
    if(filters.pago==='ok'&&p.total-p.senal>0)return false;
    return true;
  });
  var total=pedidos.length,prod=pedidos.filter(function(p){return p.fase>=4&&p.fase<6;}).length;
  var term=pedidos.filter(function(p){return p.fase===5;}).length;
  var pend=pedidos.reduce(function(s,p){return s+(p.total-p.senal);},0);
  document.getElementById('taller-stats').innerHTML='<div class="stat-card"><div class="sv">'+total+'</div><div class="sl">Pedidos</div></div><div class="stat-card"><div class="sv" style="color:#BA7517">'+prod+'</div><div class="sl">Producción</div></div><div class="stat-card"><div class="sv" style="color:#3B6D11">'+term+'</div><div class="sl">Terminados</div></div><div class="stat-card"><div class="sv" style="color:#A32D2D">'+pend.toFixed(0)+'€</div><div class="sl">Pendiente</div></div>';
  if(!list.length){document.getElementById('taller-list').innerHTML='<div class="empty-state">Sin pedidos</div>';return;}
  document.getElementById('taller-list').innerHTML=list.map(function(p){
    var pend=p.total-(p.senal||0);
    return '<div class="taller-card" onclick="verPedido(\''+p.id+'\')"><div class="taller-header"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span class="badge sec-'+p.seccion+'">'+p.seccion+'</span><span style="font-family:monospace;font-weight:700">'+p.id+'</span><span class="fase-badge fase-'+p.fase+'">'+FASES[p.fase]+'</span>'+(pend>0?'<span class="pendiente-pill">'+pend.toFixed(2)+'€</span>':'<span class="pagado-pill">Pagado</span>')+'</div><span style="font-size:12px;color:#888">'+(p.fecha_entrega?fmtDate(p.fecha_entrega):'Sin fecha')+'</span></div><div class="taller-body"><p><strong>'+p.cliente_nombre+'</strong></p><p>'+p.descripcion+'</p></div></div>';
  }).join('');
}

function verPedido(id){
  var p=pedidos.find(function(x){return x.id===id;});if(!p)return;
  var pend=p.total-(p.senal||0);
  document.getElementById('ped-title').innerHTML='<span class="badge sec-'+p.seccion+'">'+p.seccion+'</span> <span style="font-family:monospace;font-weight:700;font-size:16px">'+p.id+'</span> <span class="fase-badge fase-'+p.fase+'">'+FASES[p.fase]+'</span>';
  var html='<div style="margin-bottom:10px"><strong>'+p.cliente_nombre+'</strong>'+(p.cliente_tel?' · '+p.cliente_tel:'')+'</div>';
  html+='<div style="background:#f9f9f7;border-radius:8px;padding:10px 12px;margin-bottom:10px"><p style="font-size:13px">'+p.descripcion+'</p></div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px"><div><span style="color:#888">Entrega:</span> '+(p.fecha_entrega?fmtDate(p.fecha_entrega):'—')+'</div><div><span style="color:#888">Operario:</span> '+(p.operario||'—')+'</div><div><span style="color:#888">Total:</span> '+fmt(p.total)+'</div><div><span style="color:#888">Pendiente:</span> <span style="color:'+(pend>0?'#A32D2D':'#3B6D11')+';font-weight:700">'+fmt(pend)+'</span></div></div>';
  html+='<div style="margin-top:12px"><label style="margin-bottom:4px">Cambiar fase</label><div style="display:flex;gap:4px;flex-wrap:wrap">';
  for(var i=0;i<FASES.length;i++){html+='<button class="btn btn-sm '+(i===p.fase?'btn-primary':'btn-secondary')+'" onclick="cambiarFase(\''+p.id+'\','+i+')">'+FASES[i]+'</button>';}
  html+='</div></div>';
  document.getElementById('ped-body').innerHTML=html;
  document.getElementById('modal-pedido').classList.add('open');
}

function cambiarFase(id,f){
  sb.from('pedidos').update({fase:f}).eq('id',id).then(function(){
    var p=pedidos.find(function(x){return x.id===id;});if(p)p.fase=f;
    closeModal('modal-pedido');renderTaller();
  });
}

// ══════════════════════════════════════════════════════════════
// CLIENTES
// ══════════════════════════════════════════════════════════════
function renderClientes(q){
  var list=q?clientes.filter(function(c){return c.nombre.toLowerCase().includes(q.toLowerCase())||(c.telefono&&c.telefono.includes(q));}):clientes;
  if(!list.length){document.getElementById('clientes-list').innerHTML='<div class="empty-state">Sin clientes</div>';return;}
  document.getElementById('clientes-list').innerHTML=list.slice(0,50).map(function(c){
    return '<div class="cliente-card" onclick="verCliente('+c.id+')"><div><strong>'+c.nombre+'</strong><div style="font-size:12px;color:#888">'+(c.telefono||'')+(c.email?' · '+c.email:'')+'</div></div><span class="badge" style="background:#f5f5f5;color:#888">'+(c.sector||'—')+'</span></div>';
  }).join('');
}

function verCliente(id){
  var c=clientes.find(function(x){return x.id===id;});if(!c)return;
  var peds=pedidos.filter(function(p){return p.cliente_id===id;});
  document.getElementById('mc-title').textContent=c.nombre;
  var html='<div style="margin-bottom:10px;font-size:13px">'+(c.telefono||'')+(c.email?' · '+c.email:'')+'</div>';
  html+='<div style="font-size:12px;font-weight:600;color:#888;margin-bottom:6px">PEDIDOS ('+peds.length+')</div>';
  if(peds.length){html+=peds.slice(0,10).map(function(p){return '<div style="padding:6px 0;border-bottom:0.5px solid #f0f0f0;font-size:13px"><span style="font-family:monospace;font-weight:600">'+p.id+'</span> <span class="fase-badge fase-'+p.fase+'">'+FASES[p.fase]+'</span> '+fmt(p.total)+'</div>';}).join('');}
  else{html+='<div style="color:#aaa;font-size:13px">Sin pedidos</div>';}
  document.getElementById('mc-body').innerHTML=html;
  document.getElementById('modal-cliente').classList.add('open');
}
